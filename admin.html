<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero Exchange Admin</title>

<style>
body{
background:#0d1117;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

.order{
background:#161b22;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

.status{
color:#f5b942;
font-weight:bold;
}
</style>

</head>

<body>

<h1>Zero Exchange Admin Panel</h1>

<div id="orders">
Loading orders...
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBCrgsRmZLN6zSWjFf8wWYYoAEYTHCuvUw",
authDomain: "zeroexchange.firebaseapp.com",
projectId: "zeroexchange",
storageBucket: "zeroexchange.firebasestorage.app",
messagingSenderId: "751052526084",
appId: "1:751052526084:web:1f4d51d45297567bbddb51",
measurementId: "G-8P5XH8DT64"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window.updateStatus = async function(id, status){
alert("Button clicked");
try {

```
await updateDoc(doc(db, "orders", id), {
  status: status
});

alert("Updating...");

location.reload();
```

} catch(error){
alert("Error: " + error.message);
console.error(error);
```
alert(error.message);
console.error(error);
```

}

}

const ordersContainer = document.getElementById("orders");
ordersContainer.innerHTML = "<h2>JavaScript Works</h2>";
try {

const snapshot = await getDocs(collection(db,"orders"));

ordersContainer.innerHTML =
`<h3>Orders Found: ${snapshot.size}</h3>`;

snapshot.forEach((doc) => {

const data = doc.data();

ordersContainer.innerHTML += `
<div class="order">
<p><b>From:</b> ${data.fromCurrency}</p>
<p><b>To:</b> ${data.toCurrency}</p>
<p><b>Amount:</b> ${data.amount}</p>
<p class="status">${data.status || "pending"}</p>

<button onclick="updateStatus('${doc.id}','approved')">
Approve
</button>

<button onclick="updateStatus('${doc.id}','rejected')">
Reject
</button>

</div>
`;

});

} catch(error) {

ordersContainer.innerHTML =
`<h3>Error: ${error.message}</h3>`;

console.error(error);

}

</script>

</body>
</html>
