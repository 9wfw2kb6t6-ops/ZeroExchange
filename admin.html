<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zero Exchange Admin V3</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0d1117;
  color:white;
}

/* LOGIN */
#loginBox{
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

input{
  padding:10px;
  margin:5px;
  border-radius:6px;
  border:none;
  width:200px;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* APP */
#app{
  display:none;
  padding:20px;
}

.stats{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.card{
  background:#161b22;
  padding:10px;
  flex:1;
  border-radius:8px;
  text-align:center;
}

.order{
  background:#161b22;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
}

.status{
  font-weight:bold;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email"/>
  <input id="pass" type="password" placeholder="Password"/>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

  <div class="topbar">
    <h2>🚀 Zero Exchange V3</h2>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="stats">
    <div class="card">Total<br><span id="total">0</span></div>
    <div class="card">Pending<br><span id="pending">0</span></div>
    <div class="card">Approved<br><span id="approved">0</span></div>
    <div class="card">Rejected<br><span id="rejected">0</span></div>
  </div>

  <input id="search" placeholder="Search orders..."/>

  <div id="orders">Loading...</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCrgsRmZLN6zSWjFf8wWYYoAEYTHCuvUw",
  authDomain: "zeroexchange.firebaseapp.com",
  projectId: "zeroexchange",
  storageBucket: "zeroexchange.firebasestorage.app",
  messagingSenderId: "751052526084",
  appId: "1:751052526084:web:1f4d51d45297567bbddb51",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let allOrders = [];

// ---------- AUTH ----------
window.login = async function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  await signInWithEmailAndPassword(auth, email, pass);
};

window.logout = async function(){
  await signOut(auth);
};

onAuthStateChanged(auth, user=>{
  if(user){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";
    loadOrders();
  } else {
    document.getElementById("loginBox").style.display="flex";
    document.getElementById("app").style.display="none";
  }
});

// ---------- REALTIME ----------
function loadOrders(){

  onSnapshot(collection(db,"orders"), (snapshot)=>{

    allOrders = [];

    snapshot.forEach(docSnap=>{
      allOrders.push({id:docSnap.id, ...docSnap.data()});
    });

    render(allOrders);
  });
}

// ---------- STATS ----------
function stats(data){
  let p=0,a=0,r=0;

  data.forEach(o=>{
    if(o.status==="approved") a++;
    else if(o.status==="rejected") r++;
    else p++;
  });

  total.innerText=data.length;
  pending.innerText=p;
  approved.innerText=a;
  rejected.innerText=r;
}

// ---------- RENDER ----------
function render(data){

  const box = document.getElementById("orders");
  box.innerHTML="";

  stats(data);

  data.forEach(o=>{
    const div=document.createElement("div");
    div.className="order";

    div.innerHTML=`
      <p><b>ID:</b> ${o.id}</p>
      <p>${o.fromCurrency} → ${o.toCurrency}</p>
      <p>Amount: ${o.amount}</p>
      <p class="status">${o.status||"pending"}</p>

      <button onclick="update('${o.id}','approved')">Approve</button>
      <button onclick="update('${o.id}','rejected')">Reject</button>
    `;

    box.appendChild(div);
  });
}

// ---------- UPDATE ----------
window.update = async function(id,status){
  await updateDoc(doc(db,"orders",id),{
    status:status
  });
};

// ---------- SEARCH ----------
search.addEventListener("input",(e)=>{
  const v=e.target.value.toLowerCase();

  const f=allOrders.filter(o=>
    (o.id||"").toLowerCase().includes(v) ||
    (o.fromCurrency||"").toLowerCase().includes(v) ||
    (o.toCurrency||"").toLowerCase().includes(v)
  );

  render(f);
});

</script>

</body>
</html>
