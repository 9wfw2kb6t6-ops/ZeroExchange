<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zero Exchange V7</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet"/>

<style>
body{
margin:0;
font-family:Inter;
background:#0a0f1f;
color:white;
}

.topbar{
display:flex;
justify-content:space-between;
padding:14px;
background:#0f172a;
position:sticky;
top:0;
}

.page{display:none;padding:14px;}
.active{display:block;}

.card{
background:rgba(255,255,255,0.05);
padding:14px;
border-radius:14px;
margin-bottom:10px;
border:1px solid rgba(255,255,255,0.06);
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
background:#0b1224;
color:white;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:12px;
background:#f5b942;
font-weight:900;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.market{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.small{
font-size:12px;
color:#94a3b8;
}

.cancel{
background:#ef4444;
}
</style>
</head>

<body>

<div class="topbar">
<div><b>ZERO EXCHANGE V7</b></div>
<div>REAL ENGINE</div>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div class="card">
<h2>Portfolio</h2>
<h1 id="balance">0 USDT</h1>

<div class="grid">
<button onclick="nav('trade')">Trade</button>
<button onclick="nav('book')">Order Book</button>
<button onclick="nav('trades')">Trades</button>
<button onclick="nav('wallet')">Wallet</button>
</div>
</div>
</div>

<!-- WALLET -->
<div id="wallet" class="page">
<div class="card">
<h3>Assets</h3>
<div id="assets"></div>
</div>
</div>

<!-- TRADE -->
<div id="trade" class="page">
<div class="card">
<h3>Place Order</h3>

<select id="side">
<option value="buy">BUY</option>
<option value="sell">SELL</option>
</select>

<input id="price" placeholder="Price"/>
<input id="amount" placeholder="Amount"/>

<button onclick="placeOrder()">Submit Order</button>
</div>
</div>

<!-- ORDER BOOK -->
<div id="book" class="page">
<div class="card">
<h3>Order Book (Depth)</h3>

<h4>BUY</h4>
<div id="bids"></div>

<h4>SELL</h4>
<div id="asks"></div>
</div>
</div>

<!-- TRADES -->
<div id="trades" class="page">
<div class="card">
<h3>Trade History</h3>
<div id="tradeBox"></div>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
getDoc,
setDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */
const app = initializeApp({
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
});

const db = getFirestore(app);
const auth = getAuth(app);

let user=null;

/* INIT */
onAuthStateChanged(auth, async (u)=>{
if(!u) return;
user=u;

const ref=doc(db,"users",u.uid);
const snap=await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{
balance:1000,
assets:{USDT:1000,BTC:0}
});
}

loadWallet();
startEngine();
});

/* WALLET */
async function loadWallet(){
const snap=await getDoc(doc(db,"users",user.uid));
const d=snap.data();

document.getElementById("balance").innerText =
d.balance.toFixed(2)+" USDT";

document.getElementById("assets").innerHTML =
Object.entries(d.assets).map(([k,v])=>`${k}: ${v}`).join("<br>");
}

/* PLACE ORDER */
window.placeOrder = async function(){

await addDoc(collection(db,"orders"),{
uid:user.uid,
side:side.value,
price:Number(price.value),
amount:Number(amount.value),
filled:0,
status:"open",
ts:Date.now()
});

alert("Order placed");
}

/* =========================
   MATCH ENGINE V7 (SAFE QUEUE + FEE)
========================= */
async function engine(){

const snap = await getDocs(collection(db,"orders"));

let buys=[];
let sells=[];

snap.forEach(d=>{
let o=d.data();
o.id=d.id;

if(o.side==="buy") buys.push(o);
if(o.side==="sell") sells.push(o);
});

buys.sort((a,b)=>b.price-a.price);
sells.sort((a,b)=>a.price-b.price);

/* ORDER BOOK DEPTH */
let bidLevels={}, askLevels={};

for(let b of buys){
bidLevels[b.price]=(bidLevels[b.price]||0)+(b.amount-b.filled);
}

for(let s of sells){
askLevels[s.price]=(askLevels[s.price]||0)+(s.amount-s.filled);
}

document.getElementById("bids").innerHTML =
Object.entries(bidLevels).map(([p,a])=>`🟢 ${p} | ${a.toFixed(2)}`).join("<br>");

document.getElementById("asks").innerHTML =
Object.entries(askLevels).map(([p,a])=>`🔴 ${p} | ${a.toFixed(2)}`).join("<br>");

/* MATCHING */
for(let buy of buys){
for(let sell of sells){

if(buy.price >= sell.price &&
buy.filled < buy.amount &&
sell.filled < sell.amount){

let qty = Math.min(
buy.amount - buy.filled,
sell.amount - sell.filled
);

/* FEE */
let fee = qty * 0.001; // 0.1%
let netQty = qty - fee;

buy.filled += qty;
sell.filled += qty;

/* TRADE */
await addDoc(collection(db,"trades"),{
buyId:buy.id,
sellId:sell.id,
price:sell.price,
amount:netQty,
fee:fee,
ts:Date.now()
});

/* WALLET UPDATE */
await updateWallet(buy.uid,"buy",netQty,buy.price);
await updateWallet(sell.uid,"sell",netQty,sell.price);

/* UPDATE ORDERS */
await updateDoc(doc(db,"orders",buy.id),buy);
await updateDoc(doc(db,"orders",sell.id),sell);

}
}
}

/* TRADE HISTORY */
const tradesSnap = await getDocs(collection(db,"trades"));

document.getElementById("tradeBox").innerHTML =
tradesSnap.docs.map(d=>{
let t=d.data();
return `⚡ ${t.amount} @ ${t.price} (fee ${t.fee})`;
}).join("<br>");

}

/* WALLET ENGINE */
async function updateWallet(uid, side, amount, price){

const ref=doc(db,"users",uid);
const snap=await getDoc(ref);
let u=snap.data();

if(side==="buy"){
u.balance -= amount;
u.assets.BTC += amount/price;
}

if(side==="sell"){
u.balance += amount;
u.assets.BTC -= amount/price;
}

await updateDoc(ref,u);
}

/* RUN */
function startEngine(){
setInterval(engine, 2000);
}

/* NAV */
window.nav=(p)=>{
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
};

</script>

</body>
</html>
