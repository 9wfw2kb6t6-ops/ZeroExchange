<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zero Exchange V3</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.card{
margin:12px;
padding:14px;
background:#111a2e;
border-radius:12px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
}

button{
background:#f5b942;
font-weight:bold;
cursor:pointer;
}

.row{
padding:8px;
margin-top:6px;
background:#0f172a;
border-radius:8px;
}
</style>
</head>

<body>

<div class="card">
<h2>BTC PRICE (LIVE)</h2>
<div id="price">Loading...</div>
</div>

<div class="card">
<h3>Wallet</h3>
<div id="wallet"></div>
</div>

<div class="card">
<h3>Place Order</h3>

<select id="side">
<option value="buy">BUY</option>
<option value="sell">SELL</option>
</select>

<input id="amount" placeholder="Amount (USDT)"/>
<button onclick="placeOrder()">Submit</button>
</div>

<div class="card">
<h3>ORDER BOOK</h3>

<h4>BUY ORDERS</h4>
<div id="buys"></div>

<h4>SELL ORDERS</h4>
<div id="sells"></div>
</div>

<div class="card">
<h3>TRADES</h3>
<div id="trades"></div>
</div>

<script>
/* =========================
   1. MARKET PRICE
========================= */
let btcPrice = 0;

async function loadPrice(){
const res = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
const data = await res.json();

btcPrice = Number(data.price);

document.getElementById("price").innerText =
"$ " + btcPrice.toFixed(2);
}

setInterval(loadPrice,2000);
loadPrice();

/* =========================
   2. WALLET
========================= */
let wallet = {
USDT:1000,
BTC:0
};

function renderWallet(){
document.getElementById("wallet").innerHTML =
`USDT: ${wallet.USDT.toFixed(2)} <br> BTC: ${wallet.BTC.toFixed(6)}`;
}

renderWallet();

/* =========================
   3. ORDER BOOK
========================= */
let buyOrders = [];
let sellOrders = [];
let trades = [];

/* =========================
   4. PLACE ORDER
========================= */
function placeOrder(){

let amount = Number(document.getElementById("amount").value);
let side = document.getElementById("side").value;

if(!amount) return alert("Enter amount");

let order = {
id: Math.random().toString(36).slice(2),
side,
amount,
price: btcPrice,
filled:0,
time:Date.now()
};

/* ADD TO BOOK */
if(side==="buy") buyOrders.push(order);
if(side==="sell") sellOrders.push(order);

matchOrders();
renderBook();
}

/* =========================
   5. MATCH ENGINE (REAL LOGIC)
========================= */
function matchOrders(){

/* sort */
buyOrders.sort((a,b)=>b.price - a.price);
sellOrders.sort((a,b)=>a.price - b.price);

/* matching */
for(let buy of buyOrders){
for(let sell of sellOrders){

if(buy.price >= sell.price && buy.filled < buy.amount && sell.filled < sell.amount){

let qty = Math.min(
buy.amount - buy.filled,
sell.amount - sell.filled
);

/* fill */
buy.filled += qty;
sell.filled += qty;

/* trade */
trades.push({
price: sell.price,
amount: qty,
time: Date.now()
});

/* wallet update */
wallet.USDT -= qty;
wallet.BTC += qty / sell.price;

/* mark filled orders */
}
}
}
}

/* =========================
   6. RENDER ORDER BOOK
========================= */
function renderBook(){

document.getElementById("buys").innerHTML =
buyOrders.map(o=>
`🟢 ${o.amount} USDT | filled ${o.filled}`
).join("<br>");

document.getElementById("sells").innerHTML =
sellOrders.map(o=>
`🔴 ${o.amount} USDT | filled ${o.filled}`
).join("<br>");

document.getElementById("trades").innerHTML =
trades.slice().reverse().map(t=>
`⚡ ${t.amount} @ ${t.price}`
).join("<br>");

renderWallet();
}

/* auto refresh book */
setInterval(renderBook,2000);
</script>

</body>
</html>
