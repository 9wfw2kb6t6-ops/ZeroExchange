<!DOCTYPE html>
<html lang="fa">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zero Exchange V6</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet"
/>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:
  linear-gradient(
    180deg,
    #020617,
    #0f172a
  );

  font-family:'Inter',sans-serif;

  color:white;

  min-height:100vh;

  overflow-x:hidden;

}

/* LOGIN */

#loginPage{

  position:fixed;

  inset:0;

  background:#020617;

  display:flex;

  justify-content:center;

  align-items:center;

  z-index:99999;

}

.login-card{

  width:360px;

  background:
  rgba(255,255,255,0.04);

  border:
  1px solid rgba(255,255,255,0.08);

  padding:35px;

  border-radius:28px;

  backdrop-filter:blur(18px);

}

.logo{

  font-size:34px;

  font-weight:900;

  text-align:center;

  margin-bottom:25px;

  background:
  linear-gradient(
    90deg,
    #f5b942,
    #ffe39a
  );

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;

}

input,
select{

  width:100%;

  margin-top:14px;

  padding:15px;

  border:none;

  border-radius:14px;

  background:#0f172a;

  color:white;

  font-size:15px;

}

button{

  border:none;

  cursor:pointer;

  transition:0.25s;

}

.primary-btn{

  width:100%;

  margin-top:18px;

  padding:15px;

  border-radius:14px;

  background:
  linear-gradient(
    90deg,
    #f5b942,
    #ffdf8f
  );

  color:black;

  font-weight:800;

  font-size:15px;

}

.primary-btn:hover{

  transform:translateY(-2px);

}

/* APP */

#app{

  display:none;

  padding-bottom:120px;

}

/* HEADER */

.header{

  position:sticky;

  top:0;

  z-index:1000;

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:20px;

  background:
  rgba(2,6,23,0.85);

  backdrop-filter:blur(18px);

  border-bottom:
  1px solid rgba(255,255,255,0.05);

}

.header-left{

  display:flex;

  align-items:center;

  gap:12px;

}

.avatar{

  width:45px;

  height:45px;

  border-radius:50%;

  background:
  linear-gradient(
    135deg,
    #f5b942,
    #ffdf8f
  );

  display:flex;

  justify-content:center;

  align-items:center;

  font-weight:900;

  color:black;

}

.header-title{

  font-size:22px;

  font-weight:800;

}

.logout-btn{

  width:42px;

  height:42px;

  border-radius:12px;

  background:#ef4444;

  color:white;

  font-size:17px;

}

/* PAGE */

.page{

  display:none;

  padding:20px;

}

.page.active{

  display:block;

}

/* CARDS */

.card{

  background:
  rgba(255,255,255,0.04);

  border:
  1px solid rgba(255,255,255,0.06);

  border-radius:24px;

  padding:22px;

  backdrop-filter:blur(14px);

  margin-bottom:18px;

}

/* BALANCE */

.balance{

  font-size:42px;

  font-weight:900;

}

.balance-sub{

  color:#94a3b8;

  margin-top:8px;

}

/* ACTIONS */

.actions{

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:12px;

  margin-top:22px;

}

.action{

  background:
  rgba(255,255,255,0.04);

  border-radius:18px;

  padding:18px 10px;

  text-align:center;

}

.action i{

  color:#f5b942;

  font-size:22px;

  margin-bottom:10px;

}

/* MARKET */

.market-item{

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:16px 0;

  border-bottom:
  1px solid rgba(255,255,255,0.06);

}

.coin-left{

  display:flex;

  align-items:center;

  gap:12px;

}

.coin-icon{

  width:44px;

  height:44px;

  border-radius:50%;

  background:#111827;

  display:flex;

  justify-content:center;

  align-items:center;

  font-weight:800;

}

.green{

  color:#22c55e;

}

.red{

  color:#ef4444;

}

/* WALLET */

.wallet-card{

  background:
  rgba(255,255,255,0.04);

  border-radius:20px;

  padding:18px;

  margin-top:16px;

}

.wallet-address{

  margin-top:12px;

  padding:12px;

  border-radius:12px;

  background:#0f172a;

  font-size:13px;

  word-break:break-all;

}

/* TRADE */

.trade-grid{

  display:grid;

  gap:14px;

}

.trade-btn{

  width:100%;

  padding:16px;

  border-radius:16px;

  background:
  linear-gradient(
    90deg,
    #f5b942,
    #ffdf8f
  );

  color:black;

  font-weight:900;

}

/* NAV */

.bottom-nav{

  position:fixed;

  bottom:0;

  left:0;

  width:100%;

  background:
  rgba(2,6,23,0.92);

  border-top:
  1px solid rgba(255,255,255,0.06);

  display:grid;

  grid-template-columns:
  repeat(5,1fr);

  padding:10px 0;

  backdrop-filter:blur(18px);

}

.nav-btn{

  background:none;

  color:#94a3b8;

  display:flex;

  flex-direction:column;

  align-items:center;

  gap:6px;

  font-size:12px;

}

.nav-btn i{

  font-size:22px;

}

.nav-btn.active{

  color:#f5b942;

}

/* RESPONSIVE */

@media(max-width:650px){

  .actions{

    grid-template-columns:
    repeat(2,1fr);

  }

}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

  <div class="login-card">

    <div class="logo">
      ZERO X
    </div>

    <input
      id="email"
      type="email"
      placeholder="Email"
    >

    <input
      id="password"
      type="password"
      placeholder="Password"
    >

    <button
      class="primary-btn"
      id="loginBtn"
    >
      Login
    </button>

  </div>

</div>

<!-- APP -->

<div id="app">

  <!-- HEADER -->

  <div class="header">

    <div class="header-left">

      <div class="avatar">
        Z
      </div>

      <div>

        <div class="header-title">
          Zero Exchange
        </div>

        <div
          style="
          color:#94a3b8;
          font-size:13px;
          "
        >
          Professional Crypto Exchange
        </div>

      </div>

    </div>

    <button
      class="logout-btn"
      id="logoutBtn"
    >
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>

  </div>

  <!-- DASHBOARD -->

  <div
    class="page active"
    id="dashboardPage"
  >

    <div class="card">

      <div
        style="
        color:#94a3b8;
        "
      >
        Total Balance
      </div>

      <div class="balance">
        ₺98,613
      </div>

      <div class="balance-sub">
        ≈ 0.54 USDT
      </div>

      <div class="actions">

        <div class="action">
          <i class="fa-solid fa-wallet"></i>
          <div>Wallet</div>
        </div>

        <div class="action">
          <i class="fa-solid fa-arrow-down"></i>
          <div>Deposit</div>
        </div>

        <div class="action">
          <i class="fa-solid fa-arrow-up"></i>
          <div>Withdraw</div>
        </div>

        <div class="action">
          <i class="fa-solid fa-chart-line"></i>
          <div>Markets</div>
        </div>

      </div>

    </div>

    <div class="card">

      <h3>
        Trending Coins
      </h3>

      <div id="marketList"></div>

    </div>

  </div>

  <!-- MARKETS -->

  <div
    class="page"
    id="marketsPage"
  >

    <div class="card">

      <h2>
        Markets
      </h2>

      <input
        placeholder="Search Coin"
      >

      <div id="allMarkets"></div>

    </div>

  </div>

  <!-- WALLET -->

  <div
    class="page"
    id="walletPage"
  >

    <div class="card">

      <h2>
        Multi Wallet
      </h2>

      <div id="wallets"></div>

    </div>

  </div>

  <!-- TRADE -->

  <div
    class="page"
    id="tradePage"
  >

    <div class="card">

      <h2>
        Quick Trade
      </h2>

      <div class="trade-grid">

        <select id="fromCoin">

          <option>USDT</option>
          <option>BTC</option>
          <option>ETH</option>
          <option>BNB</option>
          <option>TON</option>

        </select>

        <input
          type="number"
          id="amount"
          placeholder="Amount"
        >

        <select id="toCoin">

          <option>BTC</option>
          <option>ETH</option>
          <option>USDT</option>
          <option>BNB</option>
          <option>TON</option>

        </select>

        <button
          class="trade-btn"
          id="tradeBtn"
        >
          Create Order
        </button>

      </div>

    </div>

    <div class="card">

      <div
        id="tradingview_chart"
      ></div>

    </div>

  </div>

  <!-- PROFILE -->

  <div
    class="page"
    id="profilePage"
  >

    <div class="card">

      <h2>
        Account Settings
      </h2>

      <br>

      <div>Email Verification</div>
      <br>

      <div>Google Authenticator</div>
      <br>

      <div>KYC Verification</div>
      <br>

      <div>Security Settings</div>

    </div>

  </div>

  <!-- NAVIGATION -->

  <div class="bottom-nav">

    <button
      class="nav-btn active"
      data-page="dashboardPage"
    >
      <i class="fa-solid fa-house"></i>
      Home
    </button>

    <button
      class="nav-btn"
      data-page="marketsPage"
    >
      <i class="fa-solid fa-chart-line"></i>
      Markets
    </button>

    <button
      class="nav-btn"
      data-page="tradePage"
    >
      <i class="fa-solid fa-arrow-right-arrow-left"></i>
      Trade
    </button>

    <button
      class="nav-btn"
      data-page="walletPage"
    >
      <i class="fa-solid fa-wallet"></i>
      Wallet
    </button>

    <button
      class="nav-btn"
      data-page="profilePage"
    >
      <i class="fa-solid fa-user"></i>
      Profile
    </button>

  </div>

</div>

<!-- TRADINGVIEW -->

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

window.addEventListener("load",()=>{

  new TradingView.widget({

    width:"100%",

    height:450,

    symbol:"BINANCE:BTCUSDT",

    interval:"15",

    timezone:"Europe/Istanbul",

    theme:"dark",

    style:"1",

    locale:"en",

    toolbar_bg:"#0f172a",

    enable_publishing:false,

    allow_symbol_change:true,

    container_id:"tradingview_chart"

  });

});

</script>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

  apiKey:
  "AIzaSyDFXmpsyGrKxUlaRj_sP1gTaaUJdsdtLps",

  authDomain:
  "zero-exchange-v5.firebaseapp.com",

  projectId:
  "zero-exchange-v5",

  storageBucket:
  "zero-exchange-v5.firebasestorage.app",

  messagingSenderId:
  "430232197516",

  appId:
  "1:430232197516:web:8abcd54749b17acc791ea9"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

/* LOGIN */

async function login(){

  const email =
  document.getElementById(
    "email"
  ).value.trim();

  const password =
  document.getElementById(
    "password"
  ).value;

  if(!email || !password){

    alert(
      "Enter Email & Password"
    );

    return;

  }

  try{

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

  }catch(error){

    alert(error.message);

  }

}

/* AUTH */

onAuthStateChanged(
auth,
(user)=>{

  if(user){

    document.getElementById(
      "loginPage"
    ).style.display="none";

    document.getElementById(
      "app"
    ).style.display="block";

  }

}
);

/* LOGOUT */

async function logout(){

  await signOut(auth);

  location.reload();

}

/* EVENTS */

document
.getElementById("loginBtn")
.addEventListener(
  "click",
  login
);

document
.getElementById("logoutBtn")
.addEventListener(
  "click",
  logout
);

/* NAVIGATION */

const navBtns =
document.querySelectorAll(
  ".nav-btn"
);

const pages =
document.querySelectorAll(
  ".page"
);

navBtns.forEach((btn)=>{

  btn.addEventListener(
    "click",
    ()=>{

      navBtns.forEach((b)=>{

        b.classList.remove(
          "active"
        );

      });

      btn.classList.add(
        "active"
      );

      pages.forEach((page)=>{

        page.classList.remove(
          "active"
        );

      });

      document
      .getElementById(
        btn.dataset.page
      )
      .classList.add(
        "active"
      );

    }
  );

});

/* MARKETS */

const coins = [

  {
    name:"Bitcoin",
    symbol:"BTC",
    price:"67,420",
    change:"+2.4%"
  },

  {
    name:"Ethereum",
    symbol:"ETH",
    price:"3,540",
    change:"+4.1%"
  },

  {
    name:"Tether",
    symbol:"USDT",
    price:"1.00",
    change:"+0.1%"
  },

  {
    name:"BNB",
    symbol:"BNB",
    price:"620",
    change:"+3.7%"
  },

  {
    name:"TON",
    symbol:"TON",
    price:"7.22",
    change:"+6.2%"
  }

];

function renderMarkets(){

  const market =
  document.getElementById(
    "marketList"
  );

  const allMarkets =
  document.getElementById(
    "allMarkets"
  );

  coins.forEach((coin)=>{

    const html = `

      <div class="market-item">

        <div class="coin-left">

          <div class="coin-icon">

            ${coin.symbol[0]}

          </div>

          <div>

            <div>
              ${coin.name}
            </div>

            <div
              style="
              color:#94a3b8;
              font-size:13px;
              "
            >
              ${coin.symbol}
            </div>

          </div>

        </div>

        <div
          style="
          text-align:right;
          "
        >

          <div>
            $${coin.price}
          </div>

          <div class="green">

            ${coin.change}

          </div>

        </div>

      </div>

    `;

    market.innerHTML += html;

    allMarkets.innerHTML += html;

  });

}

renderMarkets();

/* WALLETS */

const wallets = [

  {

    coin:"USDT",

    network:"TRC20",

    address:
"TFRmQx9mVvQ7xW3Q9h7xkK2dP5J8nL0ZQ"

  },

  {

    coin:"BTC",

    network:"Bitcoin",

    address:
"bc1q7z8x6v5n4m3l2k1j9h8g7f6d5s4a"

  },

  {

    coin:"ETH",

    network:"ERC20",

    address:
"0x71C7656EC7ab88b098defB751B7401B5f6d8976F"

  }

];

function renderWallets(){

  const walletsBox =
  document.getElementById(
    "wallets"
  );

  wallets.forEach((wallet)=>{

    walletsBox.innerHTML += `

      <div class="wallet-card">

        <h3>

          ${wallet.coin}

        </h3>

        <br>

        <div>

          ${wallet.network}

        </div>

        <div class="wallet-address">

          ${wallet.address}

        </div>

      </div>

    `;

  });

}

renderWallets();

/* CREATE ORDER */

document
.getElementById("tradeBtn")
.addEventListener(
"click",
async()=>{

  const from =
  document.getElementById(
    "fromCoin"
  ).value;

  const to =
  document.getElementById(
    "toCoin"
  ).value;

  const amount =
  document.getElementById(
    "amount"
  ).value;

  if(!amount){

    alert("Enter amount");

    return;

  }

  try{

    await addDoc(

      collection(db,"orders"),

      {

        from,
        to,
        amount,

        createdAt:
        new Date()
        .toISOString()

      }

    );

    alert(
      "Order Created"
    );

  }catch(error){

    alert(error.message);

  }

}
);

</script>

</body>
</html>
