<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zero Exchange Level 2</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet"/>

<style>
body{
margin:0;
font-family:Inter;
background:#020617;
color:white;
}

.page{display:none;padding:20px;}
.page.active{display:block;}

.card{
background:rgba(255,255,255,0.05);
padding:16px;
border-radius:16px;
margin-bottom:12px;
border:1px solid rgba(255,255,255,0.06);
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:#f5b942;
font-weight:900;
cursor:pointer;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="card">
<button onclick="nav('home')">Home</button>
<button onclick="nav('admin')">Admin</button>
<button onclick="nav('markets')">Markets</button>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="card">
<h2>Balance</h2>
<h1 id="balance">0</h1>
</div>

<div class="card">
<button onclick="nav('deposit')">Deposit</button>
<button onclick="nav('withdraw')">Withdraw</button>
<button onclick="nav('history')">History</button>
</div>

</div>

<!-- DEPOSIT -->
<div id="deposit" class="page">
<div class="card">
<h3>Deposit Request</h3>

<select id="dcoin">
<option>USDT</option>
<option>BTC</option>
<option>ETH</option>
</select>

<input id="damount" placeholder="Amount"/>

<button onclick="createDeposit()">Submit</button>
</div>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="page">
<div class="card">
<h3>Withdraw Request</h3>

<select id="wcoin">
<option>USDT</option>
<option>BTC</option>
<option>ETH</option>
</select>

<input id="wamount" placeholder="Amount"/>
<input id="waddress" placeholder="Wallet Address"/>

<button onclick="createWithdraw()">Submit</button>
</div>
</div>

<!-- HISTORY -->
<div id="history" class="page">
<div class="card">
<h3>Transactions</h3>
<div id="tx"></div>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<div class="card">
<h2>Admin Panel</h2>
<div id="adminTx"></div>
</div>
</div>

<!-- MARKETS -->
<div id="markets" class="page">
<div class="card">
<h2>Live Markets</h2>
<div id="marketBox">Loading...</div>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
doc,getDoc,setDoc,
addDoc,collection,
updateDoc,serverTimestamp,
query,where,getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;

/* INIT */
onAuthStateChanged(auth, async (u)=>{
if(!u) return;
user=u;

const ref=doc(db,"users",u.uid);
const snap=await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{balance:0,role:"user"});
}

loadBalance();
loadUserTx();
loadAdmin();
loadMarkets();
});

/* BALANCE */
async function loadBalance(){
const ref=doc(db,"users",user.uid);
const snap=await getDoc(ref);
document.getElementById("balance").innerText = snap.data().balance;
}

/* CREATE DEPOSIT */
window.createDeposit = async function(){

await addDoc(collection(db,"transactions"),{
uid:user.uid,
type:"deposit",
coin:dcoin.value,
amount:Number(damount.value),
status:"pending",
createdAt:serverTimestamp()
});

alert("Deposit sent");
}

/* CREATE WITHDRAW */
window.createWithdraw = async function(){

await addDoc(collection(db,"transactions"),{
uid:user.uid,
type:"withdraw",
coin:wcoin.value,
amount:Number(wamount.value),
address:waddress.value,
status:"pending",
createdAt:serverTimestamp()
});

alert("Withdraw sent");
}

/* USER TX */
async function loadUserTx(){

const q=query(collection(db,"transactions"),where("uid","==",user.uid));
const snap=await getDocs(q);

let html="";

snap.forEach(d=>{
const t=d.data();
html+=`
<div class="card">
<b>${t.type}</b> - ${t.amount} ${t.coin}
<br>Status: ${t.status}
</div>
`;
});

document.getElementById("tx").innerHTML=html;
}

/* ADMIN PANEL */
async function loadAdmin(){

const snap=await getDocs(collection(db,"transactions"));

let html="";

snap.forEach(d=>{
const t=d.data();

html+=`
<div class="card">
<b>${t.type.toUpperCase()}</b><br>
${t.amount} ${t.coin}<br>
Status: ${t.status}<br>

<button onclick="approve('${d.id}',${t.amount},'${t.uid}','${t.type}')">Approve</button>
<button onclick="reject('${d.id}')">Reject</button>
</div>
`;
});

document.getElementById("adminTx").innerHTML=html;
}

/* APPROVE ENGINE */
window.approve = async function(id,amount,uid,type){

const txRef=doc(db,"transactions",id);
const userRef=doc(db,"users",uid);

const userSnap=await getDoc(userRef);
let bal=userSnap.data().balance;

if(type==="deposit"){
bal += amount;
}

if(type==="withdraw"){
bal -= amount;
}

await updateDoc(userRef,{balance:bal});
await updateDoc(txRef,{status:"approved"});

alert("Approved");
location.reload();
}

/* REJECT */
window.reject = async function(id){
const txRef=doc(db,"transactions",id);
await updateDoc(txRef,{status:"rejected"});
location.reload();
}

/* MARKETS */
async function loadMarkets(){

const r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether,toncoin,binancecoin,dogecoin,ripple,solana&vs_currencies=usd&include_24hr_change=true");
const d=await r.json();

const coins=[
["BTC",d.bitcoin],
["ETH",d.ethereum],
["USDT",d.tether],
["TON",d.toncoin],
["BNB",d.binancecoin],
["DOGE",d.dogecoin],
["XRP",d.ripple],
["SOL",d.solana]
];

let html="";

coins.forEach(c=>{
html+=`
<div class="card">
<b>${c[0]}</b><br>
$${c[1].usd}
<span style="color:${c[1].usd_24h_change>=0?'#22c55e':'#ef4444'}">
(${c[1].usd_24h_change.toFixed(2)}%)
</span>
</div>
`;
});

document.getElementById("marketBox").innerHTML=html;
}

/* NAV */
window.nav=(p)=>{
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
};

</script>

</body>
</html>
