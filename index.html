<!DOCTYPE html>

<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero Exchange V5</title>

<style>
body{
  background:#0d1117;
  color:white;
  font-family:Arial,sans-serif;
  padding:20px;
}

input,button,select{
  padding:10px;
  margin:5px;
  width:220px;
  border-radius:8px;
  border:none;
}

button{
  background:#f5b942;
  cursor:pointer;
  font-weight:bold;
}

.order{
  background:#161b22;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
}

.logout-btn{
  background:#dc3545;
  color:white;
  width:auto;
}
</style>

</head>

<body>

<h2>🚀 Zero Exchange V5</h2>

<div id="loginBox">
  <input id="email" type="email" placeholder="Email">
  <br>
  <input id="password" type="password" placeholder="Password">
  <br>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<button class="logout-btn" onclick="logout()">
Logout
</button>

<hr>

<h3>Create Order</h3>

<select id="from">
  <option>USDT</option>
  <option>TRY</option>
  <option>IRR</option>
</select>

<br>

<input
id="amount"
type="number"
placeholder="Amount"

>

<br>

<select id="to">
  <option>TRY</option>
  <option>USDT</option>
  <option>IRR</option>
</select>

<br>

<button onclick="createOrder()">
Submit
</button>

<h3>Orders</h3>

<div id="orders"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDFXmpsyGrKxUlaRj_sP1gTaaUJdsdtLps",
  authDomain: "zero-exchange-v5.firebaseapp.com",
  projectId: "zero-exchange-v5",
  storageBucket: "zero-exchange-v5.firebasestorage.app",
  messagingSenderId: "430232197516",
  appId: "1:430232197516:web:8abcd54749b17acc791ea9",
  measurementId: "G-DNJ0V10CG2"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);
const auth = getAuth(firebaseApp);

/* LOGIN */

window.login = async () => {

  const email =
    document.getElementById("email").value.trim();

  const password =
    document.getElementById("password").value;

  if(!email || !password){

    alert("Email and password required");
    return;

  }

  try{

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    alert("Login success");

  }catch(error){

    alert(
      "Login error: " + error.message
    );

    console.error(error);

  }

};

/* LOGOUT */

window.logout = async () => {

  try{

    await signOut(auth);

    alert("Logged out");

    location.reload();

  }catch(error){

    alert(error.message);

  }

};

/* AUTH STATE */

onAuthStateChanged(auth,(user)=>{

  if(user){

    document.getElementById("loginBox")
      .style.display = "none";

    document.getElementById("app")
      .style.display = "block";

    loadOrders();

  }

});

/* CREATE ORDER */

window.createOrder = async ()=>{

  const from =
    document.getElementById("from").value;

  const to =
    document.getElementById("to").value;

  const amount =
    document.getElementById("amount").value;

  if(!amount){

    alert("Amount required");
    return;

  }

  try{

    await addDoc(
      collection(db,"orders"),
      {
        uid: auth.currentUser.uid,
        email: auth.currentUser.email,
        from: from,
        to: to,
        amount: Number(amount),
        status: "pending",
        createdAt:
          new Date().toISOString()
      }
    );

    alert("Order created");

    document.getElementById("amount").value="";

  }catch(error){

    alert(
      "Error: " + error.message
    );

    console.error(error);

  }

};

/* LOAD ORDERS */

function loadOrders(){

  onSnapshot(
    collection(db,"orders"),
    (snapshot)=>{

      const container =
        document.getElementById("orders");

      container.innerHTML = "";

      snapshot.forEach((doc)=>{

        const order = doc.data();

        container.innerHTML += `
          <div class="order">

            <b>
            ${order.from}
            →
            ${order.to}
            </b>

            <br>

            User:
            ${order.email || "Unknown"}

            <br>

            Amount:
            ${order.amount}

            <br>

            Status:
            ${order.status}

            <br>

            Date:
            ${order.createdAt || "-"}

          </div>
        `;

      });

    }
  );

}

</script>

</body>
</html>
