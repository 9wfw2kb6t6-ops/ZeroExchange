<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zero Exchange V4</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.card{
margin:12px;
padding:14px;
background:#111a2e;
border-radius:12px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
}

button{
background:#f5b942;
font-weight:bold;
cursor:pointer;
}

.red{background:#ef4444}
.green{background:#22c55e}

.row{
padding:8px;
margin-top:6px;
background:#0f172a;
border-radius:8px;
}
</style>
</head>

<body>

<div class="card">
<h2>BTC PRICE (LIVE)</h2>
<div id="price">Loading...</div>
</div>

<div class="card">
<h3>Wallet</h3>
<div id="wallet"></div>
</div>

<div class="card">
<h3>Place LIMIT ORDER</h3>

<select id="side">
<option value="buy">BUY</option>
<option value="sell">SELL</option>
</select>

<input id="priceInput" placeholder="Limit Price"/>
<input id="amountInput" placeholder="Amount (USDT)"/>

<button onclick="placeOrder()">Place Order</button>
</div>

<div class="card">
<h3>ORDER BOOK DEPTH</h3>

<h4>BUY</h4>
<div id="buys"></div>

<h4>SELL</h4>
<div id="sells"></div>
</div>

<div class="card">
<h3>OPEN ORDERS</h3>
<div id="openOrders"></div>
</div>

<div class="card">
<h3>TRADES</h3>
<div id="trades"></div>
</div>

<script>
/* =========================
   MARKET PRICE
========================= */
let btcPrice = 0;

async function loadPrice(){
const r = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
const d = await r.json();
btcPrice = Number(d.price);

document.getElementById("price").innerText =
"$ " + btcPrice.toFixed(2);
}

setInterval(loadPrice,2000);
loadPrice();

/* =========================
   WALLET
========================= */
let wallet = {
USDT:1000,
BTC:0
};

function renderWallet(){
document.getElementById("wallet").innerHTML =
`USDT: ${wallet.USDT.toFixed(2)} <br> BTC: ${wallet.BTC.toFixed(6)}`;
}

renderWallet();

/* =========================
   ORDER SYSTEM
========================= */
let buyOrders = [];
let sellOrders = [];
let trades = [];

/* =========================
   PLACE LIMIT ORDER
========================= */
function placeOrder(){

let side = document.getElementById("side").value;
let price = Number(document.getElementById("priceInput").value);
let amount = Number(document.getElementById("amountInput").value);

if(!price || !amount) return alert("Fill inputs");

let order = {
id:Math.random().toString(36).slice(2),
side,
price,
amount,
filled:0,
status:"open",
time:Date.now()
};

if(side==="buy") buyOrders.push(order);
if(side==="sell") sellOrders.push(order);

match();
render();
}

/* =========================
   CANCEL ORDER
========================= */
function cancelOrder(id){

buyOrders = buyOrders.filter(o=>o.id!==id);
sellOrders = sellOrders.filter(o=>o.id!==id);

render();
}

/* =========================
   MATCH ENGINE (LIMIT LOGIC)
========================= */
function match(){

buyOrders.sort((a,b)=>b.price-a.price);
sellOrders.sort((a,b)=>a.price-b.price);

for(let b of buyOrders){
for(let s of sellOrders){

if(b.price >= s.price && b.filled < b.amount && s.filled < s.amount){

let qty = Math.min(
b.amount - b.filled,
s.amount - s.filled
);

b.filled += qty;
s.filled += qty;

/* TRADE */
trades.push({
price:s.price,
amount:qty,
time:Date.now()
});

/* FEE 0.1% */
let fee = qty * 0.001;

/* WALLET UPDATE */
wallet.BTC += (qty - fee) / s.price;
wallet.USDT -= qty;

}
}
}
}

/* =========================
   ORDER BOOK DEPTH
========================= */
function groupDepth(orders){
let map={};

for(let o of orders){
let remaining = o.amount - o.filled;
if(remaining<=0) continue;

map[o.price]=(map[o.price]||0)+remaining;
}

return map;
}

/* =========================
   RENDER
========================= */
function render(){

let b = groupDepth(buyOrders);
let s = groupDepth(sellOrders);

document.getElementById("buys").innerHTML =
Object.entries(b).sort((a,b)=>b[0]-a[0])
.map(([p,a])=>`🟢 ${p} | ${a}`).join("<br>");

document.getElementById("sells").innerHTML =
Object.entries(s).sort((a,b)=>a[0]-b[0])
.map(([p,a])=>`🔴 ${p} | ${a}`).join("<br>");

document.getElementById("openOrders").innerHTML =
[...buyOrders,...sellOrders].map(o=>
`${o.side.toUpperCase()} ${o.price} | ${o.amount-o.filled}
<button onclick="cancelOrder('${o.id}')">Cancel</button>`
).join("<br>");

document.getElementById("trades").innerHTML =
trades.slice().reverse().map(t=>
`⚡ ${t.amount} @ ${t.price}`
).join("<br>");

renderWallet();
}

setInterval(render,2000);
</script>

</body>
</html>
