<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zero Exchange V13 Core</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet"/>

<style>
body{
margin:0;
font-family:Inter;
background:#020617;
color:white;
}

.page{display:none;padding:20px;}
.page.active{display:block;}

.card{
background:rgba(255,255,255,0.04);
padding:18px;
border-radius:18px;
margin-bottom:12px;
border:1px solid rgba(255,255,255,0.06);
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#f5b942;
font-weight:800;
cursor:pointer;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:none;
background:#0f172a;
color:white;
}

.market{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.green{color:#22c55e;}
.red{color:#ef4444;}
</style>
</head>

<body>

<!-- HOME -->
<div id="homePage" class="page active">

<div class="card">
<h2>Portfolio</h2>
<div style="font-size:38px;font-weight:900">
<span id="balance">0</span> USDT
</div>
</div>

<div class="card">
<button onclick="switchPage('marketsPage')">Markets</button>
<button onclick="switchPage('depositPage')">Deposit</button>
<button onclick="switchPage('withdrawPage')">Withdraw</button>
</div>

</div>

<!-- MARKETS -->
<div id="marketsPage" class="page">
<div class="card">
<h2>Live Markets</h2>
<div id="markets">Loading...</div>
</div>
</div>

<!-- DEPOSIT -->
<div id="depositPage" class="page">
<div class="card">
<h2>Deposit Request</h2>

<select id="dcoin">
<option>USDT</option>
<option>BTC</option>
<option>ETH</option>
</select>

<input id="damount" placeholder="Amount"/>

<button onclick="deposit()">Submit Deposit</button>
</div>
</div>

<!-- WITHDRAW -->
<div id="withdrawPage" class="page">
<div class="card">
<h2>Withdraw Request</h2>

<select id="wcoin">
<option>USDT</option>
<option>BTC</option>
<option>ETH</option>
</select>

<input id="wamount" placeholder="Amount"/>
<input id="waddress" placeholder="Wallet Address"/>

<button onclick="withdraw()">Submit Withdraw</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, doc, getDoc, setDoc, addDoc, collection, serverTimestamp, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT",
appId:"YOUR_APP"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;

/* INIT USER */
onAuthStateChanged(auth, async (u)=>{
if(!u) return;

user=u;

const ref=doc(db,"users",u.uid);
const snap=await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{balance:0});
}

loadBalance();
loadMarkets();
});

/* BALANCE */
async function loadBalance(){
const ref=doc(db,"users",user.uid);
const snap=await getDoc(ref);
document.getElementById("balance").innerText = snap.data().balance;
}

/* DEPOSIT */
window.deposit = async function(){

await addDoc(collection(db,"transactions"),{
uid:user.uid,
type:"deposit",
coin:dcoin.value,
amount:Number(damount.value),
status:"pending",
createdAt:serverTimestamp()
});

alert("Deposit request sent");
}

/* WITHDRAW */
window.withdraw = async function(){

await addDoc(collection(db,"transactions"),{
uid:user.uid,
type:"withdraw",
coin:wcoin.value,
amount:Number(wamount.value),
address:waddress.value,
status:"pending",
createdAt:serverTimestamp()
});

alert("Withdraw request sent");
}

/* MARKETS */
async function loadMarkets(){

try{

const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether,toncoin,binancecoin,dogecoin,ripple,solana&vs_currencies=usd&include_24hr_change=true");
const data = await res.json();

if(!data) return;

const coins=[
{name:"BTC",price:data.bitcoin.usd,change:data.bitcoin.usd_24h_change},
{name:"ETH",price:data.ethereum.usd,change:data.ethereum.usd_24h_change},
{name:"USDT",price:data.tether.usd,change:data.tether.usd_24h_change},
{name:"TON",price:data.toncoin.usd,change:data.toncoin.usd_24h_change},
{name:"BNB",price:data.binancecoin.usd,change:data.binancecoin.usd_24h_change},
{name:"DOGE",price:data.dogecoin.usd,change:data.dogecoin.usd_24h_change},
{name:"XRP",price:data.ripple.usd,change:data.ripple.usd_24h_change},
{name:"SOL",price:data.solana.usd,change:data.solana.usd_24h_change}
];

let html="";

coins.forEach(c=>{
html+=`
<div class="market">
<div>${c.name}</div>
<div>
<div>$${Number(c.price).toFixed(2)}</div>
<div class="${c.change>=0?'green':'red'}">
${Number(c.change).toFixed(2)}%
</div>
</div>
</div>
`;
});

document.getElementById("markets").innerHTML=html;

}catch(e){
document.getElementById("markets").innerHTML="Market error";
}

setInterval(loadMarkets,5000);

}

/* NAV */
window.switchPage=(p)=>{
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
};

</script>

</body>
</html>
