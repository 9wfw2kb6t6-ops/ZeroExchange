<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zero Exchange Pro MVP</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet"/>

<style>
body{
margin:0;
font-family:Inter;
background:#0a0f1f;
color:white;
}

.topbar{
display:flex;
justify-content:space-between;
padding:14px;
background:#0f172a;
position:sticky;
top:0;
}

.page{display:none;padding:14px;}
.active{display:block;}

.card{
background:rgba(255,255,255,0.05);
padding:14px;
border-radius:14px;
margin-bottom:10px;
border:1px solid rgba(255,255,255,0.06);
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:12px;
background:#f5b942;
font-weight:900;
cursor:pointer;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
background:#0b1224;
color:white;
border:none;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.market{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#0f172a;
padding:10px;
}

.nav button{
background:none;
border:none;
color:#94a3b8;
font-size:12px;
font-weight:700;
}

.nav button.active{
color:#f5b942;
}
</style>
</head>

<body>

<div class="topbar">
<div><b>ZERO EXCHANGE MVP</b></div>
<div>LIVE</div>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="card">
<h2>Portfolio</h2>
<h1 id="balance">0 USDT</h1>

<div class="grid">
<button onclick="nav('trade')">Trade</button>
<button onclick="nav('wallet')">Wallet</button>
<button onclick="nav('markets')">Markets</button>
<button onclick="nav('admin')">Admin</button>
</div>
</div>

</div>

<!-- WALLET -->
<div id="wallet" class="page">
<div class="card">
<h3>Assets</h3>
<div id="assets"></div>
</div>
</div>

<!-- TRADE -->
<div id="trade" class="page">
<div class="card">
<h3>Spot Trade</h3>

<select id="pair">
<option value="BTC">BTC/USDT</option>
<option value="ETH">ETH/USDT</option>
<option value="TON">TON/USDT</option>
</select>

<select id="side">
<option value="buy">BUY</option>
<option value="sell">SELL</option>
</select>

<input id="amount" placeholder="Amount"/>
<input id="price" placeholder="Price"/>

<button onclick="placeOrder()">Place Order</button>
</div>
</div>

<!-- MARKETS -->
<div id="markets" class="page">
<div class="card">
<h3>Live Markets</h3>
<div id="marketBox">Loading...</div>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<div class="card">
<h3>Admin Panel</h3>
<div id="txBox">Loading...</div>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="nav('home')" class="active">Home</button>
<button onclick="nav('trade')">Trade</button>
<button onclick="nav('wallet')">Wallet</button>
<button onclick="nav('markets')">Markets</button>
<button onclick="nav('admin')">Admin</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
doc,getDoc,setDoc,
addDoc,collection,
updateDoc,
serverTimestamp,
onSnapshot,
query
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */
const app = initializeApp({
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
});

const db = getFirestore(app);
const auth = getAuth(app);

let user=null;

/* INIT */
onAuthStateChanged(auth, async (u)=>{
if(!u) return;
user=u;

const ref=doc(db,"users",u.uid);
const snap=await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{
balance:1000,
assets:{USDT:1000,BTC:0,ETH:0,TON:0}
});
}

loadWallet();
listenOrders();
loadMarkets();
});

/* WALLET */
async function loadWallet(){
const snap = await getDoc(doc(db,"users",user.uid));
const d = snap.data();

document.getElementById("balance").innerText =
d.balance + " USDT";

document.getElementById("assets").innerHTML =
Object.entries(d.assets)
.map(([k,v])=>`${k}: ${v}`)
.join("<br>");
}

/* ORDER */
window.placeOrder = async function(){

await addDoc(collection(db,"orders"),{
uid:user.uid,
pair:pair.value,
side:side.value,
amount:Number(amount.value),
price:Number(price.value),
status:"open",
createdAt:serverTimestamp()
});

alert("Order placed");
}

/* ADMIN ENGINE */
function listenOrders(){

const q = query(collection(db,"orders"));

onSnapshot(q,(snap)=>{

let html="";

snap.forEach(d=>{

const o=d.data();

html+=`
<div class="card">
${o.side.toUpperCase()} ${o.amount} ${o.pair} @ ${o.price}

<button onclick="execute('${d.id}','${o.side}',${o.amount},${o.price})">
EXECUTE
</button>
</div>
`;
});

document.getElementById("txBox").innerHTML=html;

});

}

/* TRADING ENGINE */
window.execute = async function(id,side,amount,price){

const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);
let d = snap.data();

if(side==="buy"){
d.balance -= amount;
d.assets.BTC += amount/price;
}

if(side==="sell"){
d.balance += amount;
d.assets.BTC -= amount/price;
}

await updateDoc(ref,d);
await updateDoc(doc(db,"orders",id),{status:"filled"});

alert("Executed");
}

/* MARKETS */
async function loadMarkets(){

try{

const r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,toncoin&vs_currencies=usd");
const d = await r.json();

document.getElementById("marketBox").innerHTML=`
<div class="market">BTC: $${d.bitcoin.usd}</div>
<div class="market">ETH: $${d.ethereum.usd}</div>
<div class="market">TON: $${d.toncoin.usd}</div>
`;

}catch(e){
document.getElementById("marketBox").innerHTML="Market offline";
}

}

/* NAV */
window.nav=(p)=>{
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
};

</script>

</body>
</html>
