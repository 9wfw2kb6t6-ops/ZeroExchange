<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zero Exchange V4</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet"/>

<style>
body{
margin:0;
font-family:Inter;
background:#0a0f1f;
color:white;
}

.topbar{
display:flex;
justify-content:space-between;
padding:14px;
background:#0f172a;
position:sticky;
top:0;
}

.page{display:none;padding:14px;}
.active{display:block;}

.card{
background:rgba(255,255,255,0.05);
padding:14px;
border-radius:14px;
margin-bottom:10px;
border:1px solid rgba(255,255,255,0.06);
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
background:#0b1224;
color:white;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:12px;
background:#f5b942;
font-weight:900;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.market{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#0f172a;
padding:10px;
}

.nav button{
background:none;
border:none;
color:#94a3b8;
font-size:12px;
font-weight:700;
}

.nav button.active{
color:#f5b942;
}
</style>
</head>

<body>

<div class="topbar">
<div><b>ZERO EXCHANGE V4</b></div>
<div>LIVE ENGINE</div>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div class="card">
<h2>Portfolio</h2>
<h1 id="balance">0 USDT</h1>

<div class="grid">
<button onclick="nav('trade')">Trade</button>
<button onclick="nav('wallet')">Wallet</button>
<button onclick="nav('orderbook')">Order Book</button>
</div>
</div>
</div>

<!-- WALLET -->
<div id="wallet" class="page">
<div class="card">
<h3>Assets</h3>
<div id="assets"></div>
</div>
</div>

<!-- TRADE -->
<div id="trade" class="page">
<div class="card">
<h3>Place Order</h3>

<select id="side">
<option value="buy">BUY</option>
<option value="sell">SELL</option>
</select>

<input id="price" placeholder="Price"/>
<input id="amount" placeholder="Amount"/>

<button onclick="placeOrder()">Submit Order</button>
</div>
</div>

<!-- ORDER BOOK -->
<div id="orderbook" class="page">
<div class="card">
<h3>Order Book</h3>

<h4>BUY ORDERS</h4>
<div id="bids"></div>

<h4>SELL ORDERS</h4>
<div id="asks"></div>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="nav('home')" class="active">Home</button>
<button onclick="nav('trade')">Trade</button>
<button onclick="nav('wallet')">Wallet</button>
<button onclick="nav('orderbook')">Book</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
doc,getDoc,setDoc,
addDoc,collection,
updateDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* 🔥 FIREBASE CONFIG */
const app = initializeApp({
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
});

const db = getFirestore(app);
const auth = getAuth(app);

let user=null;

/* =========================
   INIT USER
========================= */
onAuthStateChanged(auth, async (u)=>{
if(!u) return;
user=u;

const ref = doc(db,"users",u.uid);
const snap = await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{
balance:1000,
assets:{USDT:1000,BTC:0,ETH:0}
});
}

loadWallet();
listenOrders();
});

/* =========================
   WALLET
========================= */
async function loadWallet(){
const snap = await getDoc(doc(db,"users",user.uid));
const d = snap.data();

document.getElementById("balance").innerText =
d.balance + " USDT";

document.getElementById("assets").innerHTML =
Object.entries(d.assets)
.map(([k,v])=>`${k}: ${v}`)
.join("<br>");
}

/* =========================
   PLACE ORDER
========================= */
window.placeOrder = async function(){

await addDoc(collection(db,"orders"),{
uid:user.uid,
side:side.value,
price:Number(price.value),
amount:Number(amount.value),
filled:0,
status:"open",
createdAt:Date.now()
});

alert("Order placed");
}

/* =========================
   ORDER LISTENER + ENGINE
========================= */
function listenOrders(){

onSnapshot(collection(db,"orders"), async (snap)=>{

let buys=[];
let sells=[];

snap.forEach(d=>{
let o=d.data();
o.id=d.id;

if(o.side==="buy") buys.push(o);
if(o.side==="sell") sells.push(o);
});

/* SORT */
buys.sort((a,b)=>b.price-a.price);
sells.sort((a,b)=>a.price-b.price);

/* ORDER BOOK UI */
document.getElementById("bids").innerHTML =
buys.map(b=>`🟢 ${b.price} | ${b.amount}`).join("<br>");

document.getElementById("asks").innerHTML =
sells.map(s=>`🔴 ${s.price} | ${s.amount}`).join("<br>");

/* =========================
   MATCH ENGINE (AUTO)
========================= */
for(let buy of buys){
for(let sell of sells){

if(buy.price >= sell.price && buy.filled < buy.amount && sell.filled < sell.amount){

let qty = Math.min(
buy.amount - buy.filled,
sell.amount - sell.filled
);

/* update fills */
buy.filled += qty;
sell.filled += qty;

/* USERS */
await updateWallet(buy.uid,"buy",qty,buy.price);
await updateWallet(sell.uid,"sell",qty,sell.price);

/* update orders */
await updateDoc(doc(db,"orders",buy.id),buy);
await updateDoc(doc(db,"orders",sell.id),sell);

}
}
}

});
}

/* =========================
   WALLET ENGINE
========================= */
async function updateWallet(uid, side, amount, price){

const ref = doc(db,"users",uid);
const snap = await getDoc(ref);
let u = snap.data();

/* BUY */
if(side==="buy"){
u.balance -= amount;
u.assets.BTC += amount/price;
}

/* SELL */
if(side==="sell"){
u.balance += amount;
u.assets.BTC -= amount/price;
}

await updateDoc(ref,u);
}

/* =========================
   NAV
========================= */
window.nav=(p)=>{
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
};

</script>

</body>
</html>
