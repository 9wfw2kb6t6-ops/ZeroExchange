<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#060b18;
color:white;
overflow-x:hidden;
}

/* HEADER */

.header{
position:sticky;
top:0;
z-index:999;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
background:#0f172a;
border-bottom:1px solid rgba(255,255,255,0.06);
}

.logo{
font-size:28px;
font-weight:900;
color:#f5b942;
}

.market-live{
font-size:14px;
color:#22c55e;
}

/* PAGE */

.page{
padding:18px;
padding-bottom:120px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
border-radius:24px;
padding:20px;
margin-bottom:18px;
}

/* BALANCE */

.balance{
font-size:52px;
font-weight:900;
margin-top:10px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
margin-top:18px;
}

.action{
background:#111827;
padding:24px;
border-radius:18px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.action:hover{
transform:scale(1.02);
}

.action-title{
margin-top:10px;
font-weight:700;
}

/* INPUT */

input,
select{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:14px;
background:#0f172a;
color:white;
font-size:15px;
outline:none;
}

button{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:14px;
background:#f5b942;
color:black;
font-weight:900;
cursor:pointer;
}

/* ROW */

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,0.06);
}

/* COLORS */

.green{
color:#22c55e;
}

.red{
color:#ef4444;
}

.gray{
color:#94a3b8;
}

/* NAV */

.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
display:grid;
grid-template-columns:repeat(4,1fr);
background:#0f172a;
padding:10px 0;
border-top:1px solid rgba(255,255,255,0.06);
}

.nav button{
background:none;
margin:0;
color:white;
font-size:14px;
}

/* QR */

.qr{
width:180px;
height:180px;
margin:20px auto;
background:white;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
color:black;
font-weight:900;
}
