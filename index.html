<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Zero Exchange Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1020;
color:white;
}

.page{display:none;padding:18px}
.active{display:block}

.card{
background:#141b2d;
padding:14px;
border-radius:12px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#f5b942;
border:none;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="card">
<button onclick="nav('wallet')">Wallet</button>
<button onclick="nav('trade')">Trade</button>
<button onclick="nav('orders')">Orders</button>
<button onclick="nav('admin')">Admin</button>
</div>

<!-- WALLET -->
<div id="wallet" class="page active">
<div class="card">
<h2>Wallet (Multi Asset)</h2>
<div id="balances"></div>
</div>
</div>

<!-- TRADE -->
<div id="trade" class="page">
<div class="card">
<h2>Spot Trade</h2>

<select id="pair">
<option value="BTC">BTC/USDT</option>
<option value="ETH">ETH/USDT</option>
<option value="TON">TON/USDT</option>
</select>

<select id="side">
<option value="buy">BUY</option>
<option value="sell">SELL</option>
</select>

<input id="amount" placeholder="Amount"/>
<button onclick="placeOrder()">Place Order</button>

<div id="status"></div>
</div>
</div>

<!-- ORDERS -->
<div id="orders" class="page">
<div class="card">
<h2>Order History</h2>
<div id="orderBox"></div>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<div class="card">
<h2>Admin Panel</h2>
<div id="adminBox"></div>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
doc,getDoc,setDoc,
addDoc,collection,
updateDoc,serverTimestamp,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
});

const db = getFirestore(app);
const auth = getAuth(app);

let user=null;

/* INIT */
onAuthStateChanged(auth, async (u)=>{
if(!u) return;
user=u;

const ref=doc(db,"users",u.uid);
const snap=await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{
balances:{USDT:1000,BTC:0,ETH:0,TON:0}
});
}

loadWallet();
loadOrders();
loadAdmin();
});

/* WALLET */
async function loadWallet(){
const snap = await getDoc(doc(db,"users",user.uid));
const b = snap.data().balances;

document.getElementById("balances").innerHTML =
Object.keys(b).map(k=>`${k}: ${b[k]}`).join("<br>");
}

/* ORDER SYSTEM */
window.placeOrder = async function(){

await addDoc(collection(db,"orders"),{
uid:user.uid,
pair:pair.value,
side:side.value,
amount:Number(amount.value),
status:"open",
createdAt:serverTimestamp()
});

document.getElementById("status").innerText="Order placed";
}

/* LOAD ORDERS */
async function loadOrders(){

const snap = await getDocs(collection(db,"orders"));

let html="";

snap.forEach(d=>{
const o=d.data();

html+=`
<div class="card">
${o.side.toUpperCase()} ${o.amount} ${o.pair}
</div>
`;
});

document.getElementById("orderBox").innerHTML=html;
}

/* ADMIN */
async function loadAdmin(){

const snap = await getDocs(collection(db,"orders"));

let html="";

snap.forEach(d=>{
const o=d.data();

html+=`
<div class="card">
${o.side} ${o.amount} ${o.pair}
<button onclick="fill('${d.id}','${o.side}',${o.amount})">Execute</button>
</div>
`;
});

document.getElementById("adminBox").innerHTML=html;
}

/* EXECUTE TRADE (SIMPLIFIED ENGINE) */
window.fill = async function(id,side,amount){

const ref = doc(db,"orders",id);
const orderSnap = await getDoc(ref);
const order = orderSnap.data();

const userRef = doc(db,"users",order.uid);
const userSnap = await getDoc(userRef);

let b = userSnap.data().balances;

/* SIMPLE TRADE ENGINE */
if(order.side==="buy"){
b.USDT -= order.amount;
b.BTC += order.amount / 65000;
}

if(order.side==="sell"){
b.USDT += order.amount;
b.BTC -= order.amount / 65000;
}

await updateDoc(userRef,{balances:b});
await updateDoc(ref,{status:"filled"});

alert("Executed");
location.reload();
};

/* NAV */
window.nav=(p)=>{
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
};

</script>

</body>
</html>
