<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zero Exchange Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet"/>

<style>

body{
margin:0;
font-family:Inter;
background:#0b1020;
color:white;
}

.topbar{
display:flex;
justify-content:space-between;
padding:14px;
background:#0f172a;
position:sticky;
top:0;
}

.page{display:none;padding:16px;}
.active{display:block;}

.card{
background:rgba(255,255,255,0.05);
padding:14px;
border-radius:14px;
margin-bottom:10px;
border:1px solid rgba(255,255,255,0.06);
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:12px;
background:#f5b942;
font-weight:900;
cursor:pointer;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

.market{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
justify-content:space-around;
background:#0f172a;
padding:10px;
border-top:1px solid rgba(255,255,255,0.06);
}

.nav button{
background:none;
border:none;
color:#94a3b8;
font-size:12px;
font-weight:600;
}

.nav button.active{
color:#f5b942;
}

</style>
</head>

<body>

<div class="topbar">
<div><b>Zero Exchange</b></div>
<div>LIVE</div>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="card">
<h2>Portfolio</h2>
<h1 id="balance">0 USDT</h1>
</div>

<div class="card">
<button onclick="nav('deposit')">Deposit</button>
<button onclick="nav('withdraw')">Withdraw</button>
<button onclick="nav('wallet')">Wallet</button>
<button onclick="nav('markets')">Markets</button>
<button onclick="nav('admin')">Admin</button>
</div>

</div>

<!-- WALLET -->
<div id="wallet" class="page">

<div class="card">
<h3>Assets</h3>
<div id="assets">Loading...</div>
</div>

</div>

<!-- DEPOSIT -->
<div id="deposit" class="page">

<div class="card">
<h3>Deposit Request</h3>

<select id="dcoin">
<option>USDT</option>
<option>BTC</option>
<option>ETH</option>
</select>

<input id="damount" placeholder="Amount"/>

<button onclick="deposit()">Submit Deposit</button>
</div>

</div>

<!-- WITHDRAW -->
<div id="withdraw" class="page">

<div class="card">
<h3>Withdraw Request</h3>

<select id="wcoin">
<option>USDT</option>
<option>BTC</option>
<option>ETH</option>
</select>

<input id="wamount" placeholder="Amount"/>
<input id="waddress" placeholder="Wallet Address"/>

<button onclick="withdraw()">Submit Withdraw</button>
</div>

</div>

<!-- MARKETS -->
<div id="markets" class="page">

<div class="card">
<h3>Live Markets</h3>
<div id="marketBox">Loading...</div>
</div>

</div>

<!-- ADMIN -->
<div id="admin" class="page">

<div class="card">
<h3>Admin Panel</h3>
<div id="txBox">Loading...</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="nav('home')" class="active">Home</button>
<button onclick="nav('markets')">Markets</button>
<button onclick="nav('wallet')">Wallet</button>
<button onclick="nav('deposit')">Deposit</button>
<button onclick="nav('withdraw')">Withdraw</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
doc,getDoc,setDoc,
addDoc,collection,
updateDoc,
serverTimestamp,
onSnapshot,
query
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;

/* AUTH */
onAuthStateChanged(auth, async (u)=>{
if(!u) return;
user=u;

const ref=doc(db,"users",u.uid);
const snap=await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{
balance:0,
assets:{USDT:0,BTC:0,ETH:0}
});
}

loadBalance();
listenTx();
loadMarkets();
});

/* BALANCE */
async function loadBalance(){
const snap = await getDoc(doc(db,"users",user.uid));
document.getElementById("balance").innerText =
snap.data().balance + " USDT";

document.getElementById("assets").innerHTML =
Object.entries(snap.data().assets)
.map(([k,v])=>`${k}: ${v}`)
.join("<br>");
}

/* DEPOSIT */
window.deposit = async function(){

await addDoc(collection(db,"transactions"),{
uid:user.uid,
type:"deposit",
coin:dcoin.value,
amount:Number(damount.value),
status:"pending",
createdAt:serverTimestamp()
});

alert("Deposit sent");
}

/* WITHDRAW SAFE */
window.withdraw = async function(){

const snap = await getDoc(doc(db,"users",user.uid));
const bal = snap.data().balance;

if(Number(wamount.value) > bal){
alert("Not enough balance");
return;
}

await addDoc(collection(db,"transactions"),{
uid:user.uid,
type:"withdraw",
coin:wcoin.value,
amount:Number(wamount.value),
address:waddress.value,
status:"pending",
createdAt:serverTimestamp()
});

alert("Withdraw sent");
}

/* ADMIN + TX LISTENER */
function listenTx(){

const q = query(collection(db,"transactions"));

onSnapshot(q,(snap)=>{

let html="";

snap.forEach(d=>{

const t=d.data();

html+=`
<div class="card">
<b>${t.type}</b><br>
${t.amount} ${t.coin}<br>
Status: ${t.status}<br>

<button onclick="approve('${d.id}',${t.amount},'${t.uid}','${t.type}','${t.coin}')">
Approve
</button>

<button onclick="reject('${d.id}')">
Reject
</button>

</div>
`;
});

document.getElementById("txBox").innerHTML=html;

});

}

/* APPROVE ENGINE */
window.approve = async function(id,amount,uid,type,coin){

const userRef=doc(db,"users",uid);
const txRef=doc(db,"transactions",id);

const snap=await getDoc(userRef);
let data=snap.data();

let balance=data.balance;
let assets=data.assets;

/* deposit */
if(type==="deposit"){
balance+=amount;
assets[coin]=(assets[coin]||0)+amount;
}

/* withdraw */
if(type==="withdraw"){
balance-=amount;
assets[coin]=(assets[coin]||0)-amount;
}

await updateDoc(userRef,{balance,assets});
await updateDoc(txRef,{status:"approved"});

alert("Approved");
}

/* REJECT */
window.reject = async function(id){
await updateDoc(doc(db,"transactions",id),{
status:"rejected"
});
}

/* MARKETS */
async function loadMarkets(){

try{

const r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,toncoin&vs_currencies=usd");
const d=await r.json();

document.getElementById("marketBox").innerHTML=`
<div class="market">BTC: $${d.bitcoin.usd}</div>
<div class="market">ETH: $${d.ethereum.usd}</div>
<div class="market">TON: $${d.toncoin.usd}</div>
`;

}catch(e){
document.getElementById("marketBox").innerHTML="Market offline";
}

}

/* NAV */
window.nav=(p)=>{
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
};

</script>

</body>
</html>
