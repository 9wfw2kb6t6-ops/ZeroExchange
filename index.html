<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Zero Exchange V1 REAL</title>
<style>
body{background:#0b1220;color:white;font-family:Arial;margin:0}
.card{padding:14px;background:#111a2e;margin:10px;border-radius:12px}
.price{font-size:32px;font-weight:bold}
</style>
</head>
<body>

<div class="card">
<h2>LIVE BTC PRICE</h2>
<div id="price" class="price">Loading...</div>
</div>

<div class="card">
<h3>Wallet</h3>
<div id="wallet">Loading...</div>
</div>

<script>
/* =========================
   1. REAL MARKET DATA
========================= */
async function loadPrice(){
const res = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
const data = await res.json();

document.getElementById("price").innerText =
"$ " + Number(data.price).toFixed(2);
}

setInterval(loadPrice, 2000);
loadPrice();

/* =========================
   2. SIMPLE WALLET (MOCK)
========================= */
let wallet = {
USDT: 1000,
BTC: 0
};

function renderWallet(){
document.getElementById("wallet").innerHTML =
`USDT: ${wallet.USDT} <br> BTC: ${wallet.BTC}`;
}

renderWallet();
</script>

</body>
</html>
