<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zero Exchange</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter;
background:#060b18;
color:white;
overflow-x:hidden;
}

/* HEADER */

.header{
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
background:#0f172a;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:26px;
font-weight:900;
color:#f5b942;
}

/* PAGE */

.page{
padding:18px;
padding-bottom:120px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
border-radius:20px;
padding:18px;
margin-bottom:18px;
}

/* BALANCE */

.balance{
font-size:48px;
font-weight:900;
margin-top:10px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:16px;
}

.action{
background:#111827;
padding:20px;
border-radius:18px;
text-align:center;
cursor:pointer;
}

/* INPUT */

input,select{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background:#f5b942;
font-weight:900;
cursor:pointer;
}

/* ORDERBOOK */

.order-row{
display:flex;
justify-content:space-between;
padding:8px 0;
font-size:14px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.green{
color:#22c55e;
}

.red{
color:#ef4444;
}

/* NAV */

.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
display:grid;
grid-template-columns:repeat(4,1fr);
background:#0f172a;
padding:10px 0;
}

.nav button{
background:none;
color:white;
margin:0;
padding:10px;
}

.small{
font-size:13px;
color:#94a3b8;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">
<div class="logo">
ZERO EXCHANGE
</div>

<div id="livePrice">
Loading...
</div>
</div>

<!-- PAGE -->

<div class="page">

<!-- DASHBOARD -->

<div class="card">

<div class="small">
Portfolio Balance
</div>

<div class="balance" id="portfolio">
$1000.00
</div>

<div class="grid">

<div class="action">
Wallet
</div>

<div class="action">
Markets
</div>

<div class="action">
Deposit
</div>

<div class="action">
Withdraw
</div>

</div>

</div>

<!-- WALLET -->

<div class="card">

<h2>
Wallet
</h2>

<div style="margin-top:16px">

<div class="order-row">
<div>USDT</div>
<div id="usdtBalance">1000</div>
</div>

<div class="order-row">
<div>BTC</div>
<div id="btcBalance">0</div>
</div>

</div>

</div>

<!-- TRADE -->

<div class="card">

<h2>
Trade BTC/USDT
</h2>

<select id="side">
<option value="buy">
BUY
</option>

<option value="sell">
SELL
</option>
</select>

<input
id="priceInput"
placeholder="Limit Price"
/>

<input
id="amountInput"
placeholder="Amount USDT"
/>

<button onclick="placeOrder()">
Place Order
</button>

</div>

<!-- ORDER BOOK -->

<div class="card">

<h2>
Order Book
</h2>

<h3 class="green" style="margin-top:16px">
BUY ORDERS
</h3>

<div id="buyBook"></div>

<h3 class="red" style="margin-top:16px">
SELL ORDERS
</h3>

<div id="sellBook"></div>

</div>

<!-- OPEN ORDERS -->

<div class="card">

<h2>
Open Orders
</h2>

<div id="openOrders"></div>

</div>

<!-- TRADES -->

<div class="card">

<h2>
Trade History
</h2>

<div id="tradeHistory"></div>

</div>

</div>

<!-- NAV -->

<div class="nav">

<button>
Home
</button>

<button>
Markets
</button>

<button>
Wallet
</button>

<button>
Trade
</button>

</div>

<script>

/* =========================
   LIVE MARKET PRICE
========================= */

let btcPrice = 0;

async function loadPrice(){

try{

const res =
await fetch(
"https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT"
);

const data =
await res.json();

btcPrice =
Number(data.price);

document
.getElementById("livePrice")
.innerText =
"BTC $" +
btcPrice.toFixed(2);

}catch(e){

document
.getElementById("livePrice")
.innerText =
"Market Offline";

}

}

loadPrice();

setInterval(
loadPrice,
3000
);

/* =========================
   WALLET
========================= */

let wallet = {

USDT:1000,
BTC:0

};

function renderWallet(){

document
.getElementById("usdtBalance")
.innerText =
wallet.USDT.toFixed(2);

document
.getElementById("btcBalance")
.innerText =
wallet.BTC.toFixed(6);

document
.getElementById("portfolio")
.innerText =
"$" + (
wallet.USDT +
(wallet.BTC * btcPrice)
).toFixed(2);

}

/* =========================
   ORDER BOOK
========================= */

let buyOrders = [];
let sellOrders = [];
let trades = [];

/* =========================
   PLACE ORDER
========================= */

function placeOrder(){

let side =
document
.getElementById("side")
.value;

let price =
Number(
document
.getElementById("priceInput")
.value
);

let amount =
Number(
document
.getElementById("amountInput")
.value
);

if(!price || !amount){

alert("Fill inputs");

return;

}

let order = {

id:
Math.random()
.toString(36)
.slice(2),

side,
price,
amount,
filled:0,

time:
Date.now()

};

if(side==="buy")
buyOrders.push(order);

if(side==="sell")
sellOrders.push(order);

matchOrders();

render();

}

/* =========================
   MATCH ENGINE
========================= */

function matchOrders(){

buyOrders.sort(
(a,b)=>
b.price-a.price
);

sellOrders.sort(
(a,b)=>
a.price-b.price
);

for(let buy of buyOrders){

for(let sell of sellOrders){

if(

buy.price >= sell.price &&

buy.filled < buy.amount &&

sell.filled < sell.amount

){

let qty =
Math.min(

buy.amount-buy.filled,

sell.amount-sell.filled

);

/* fill */

buy.filled += qty;

sell.filled += qty;

/* fee */

let fee =
qty * 0.001;

/* wallet */

wallet.USDT -= qty;

wallet.BTC +=
(qty-fee) /
sell.price;

/* trade */

trades.push({

price:sell.price,

amount:qty,

time:
new Date()
.toLocaleTimeString()

});

}

}

}

}

/* =========================
   RENDER
========================= */

function render(){

renderWallet();

/* BUY BOOK */

document
.getElementById("buyBook")
.innerHTML =

buyOrders.map(o=>`

<div class="order-row">

<div class="green">
${o.price}
</div>

<div>
${(o.amount-o.filled).toFixed(2)}
</div>

</div>

`).join("");

/* SELL BOOK */

document
.getElementById("sellBook")
.innerHTML =

sellOrders.map(o=>`

<div class="order-row">

<div class="red">
${o.price}
</div>

<div>
${(o.amount-o.filled).toFixed(2)}
</div>

</div>

`).join("");

/* OPEN ORDERS */

document
.getElementById("openOrders")
.innerHTML =

[...buyOrders,...sellOrders]

.map(o=>`

<div class="order-row">

<div>
${o.side.toUpperCase()}
</div>

<div>
${o.price}
</div>

<div>
${(o.amount-o.filled).toFixed(2)}
</div>

</div>

`).join("");

/* TRADES */

document
.getElementById("tradeHistory")
.innerHTML =

trades.slice().reverse().map(t=>`

<div class="order-row">

<div>
⚡ ${t.amount}
</div>

<div>
${t.price}
</div>

<div>
${t.time}
</div>

</div>

`).join("");

}

render();

</script>

</body>
</html>
