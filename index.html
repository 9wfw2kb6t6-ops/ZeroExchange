<!-- ZERO EXCHANGE V11 FULL FIXED -->
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zero Exchange</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(180deg,#020617,#08112b);
color:white;
overflow-x:hidden;
}

/* PAGE */
.page{display:none;padding:20px;}
.page.active{display:block;}

/* CARD */
.card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
border-radius:24px;
padding:20px;
margin-bottom:16px;
backdrop-filter:blur(12px);
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
position:sticky;
top:0;
background:rgba(2,6,23,0.9);
backdrop-filter:blur(12px);
}

/* BALANCE */
.balance{
font-size:42px;
font-weight:900;
margin-top:10px;
}

/* BUTTON */
button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin-top:10px;
background:linear-gradient(90deg,#f5b942,#ffe08a);
font-weight:800;
cursor:pointer;
color:black;
}

/* INPUT */
input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:none;
background:#0f172a;
color:white;
}

/* MARKET */
.market{
display:flex;
justify-content:space-between;
padding:14px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.green{color:#22c55e;}
.red{color:#ef4444;}
</style>
</head>

<body>

<div class="header">
<div><b>Zero Exchange</b></div>
<div>Live</div>
</div>

<!-- HOME -->
<div id="homePage" class="page active">

<div class="card">
<div>Portfolio Balance</div>
<div class="balance">₺245,912</div>
<div style="color:#94a3b8">≈ $7,490</div>
</div>

<div class="card">
<button onclick="switchPage('marketsPage')">Markets</button>
<button onclick="switchPage('depositPage')">Deposit</button>
<button onclick="switchPage('withdrawPage')">Withdraw</button>
</div>

</div>

<!-- MARKETS -->
<div id="marketsPage" class="page">

<div class="card">
<h2>Live Markets</h2>
<div id="markets">Loading...</div>
</div>

</div>

<!-- DEPOSIT -->
<div id="depositPage" class="page">

<div class="card">
<h2>Deposit</h2>

<select>
<option>USDT TRC20</option>
<option>BTC</option>
<option>ETH</option>
</select>

<input placeholder="Amount"/>

<button>Send Deposit Request</button>
</div>

</div>

<!-- WITHDRAW -->
<div id="withdrawPage" class="page">

<div class="card">
<h2>Withdraw</h2>

<select>
<option>USDT</option>
<option>BTC</option>
<option>ETH</option>
</select>

<input placeholder="Amount"/>
<input placeholder="Wallet Address"/>

<button>Submit Withdraw</button>
</div>

</div>

<script>
/* NAV */
function switchPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* LIVE MARKETS */
async function loadMarkets(){

try{

const res = await fetch(
"https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether,toncoin,binancecoin,dogecoin,ripple,solana&vs_currencies=usd&include_24hr_change=true"
);

const data = await res.json();

const coins = [
{name:"Bitcoin",symbol:"BTC",price:data.bitcoin.usd,change:data.bitcoin.usd_24h_change},
{name:"Ethereum",symbol:"ETH",price:data.ethereum.usd,change:data.ethereum.usd_24h_change},
{name:"Tether",symbol:"USDT",price:data.tether.usd,change:data.tether.usd_24h_change},
{name:"TON",symbol:"TON",price:data.toncoin.usd,change:data.toncoin.usd_24h_change},
{name:"BNB",symbol:"BNB",price:data.binancecoin.usd,change:data.binancecoin.usd_24h_change},
{name:"DOGE",symbol:"DOGE",price:data.dogecoin.usd,change:data.dogecoin.usd_24h_change},
{name:"XRP",symbol:"XRP",price:data.ripple.usd,change:data.ripple.usd_24h_change},
{name:"SOL",symbol:"SOL",price:data.solana.usd,change:data.solana.usd_24h_change}
];

const markets = document.getElementById("markets");
markets.innerHTML = "";

coins.forEach(c=>{

markets.innerHTML += `
<div class="market">
<div>
<b>${c.name}</b><br>
<small>${c.symbol}</small>
</div>

<div style="text-align:right">
<div>$${Number(c.price).toFixed(2)}</div>
<div class="${c.change>=0?'green':'red'}">
${c.change.toFixed(2)}%
</div>
</div>
</div>
`;

});

}catch(e){
document.getElementById("markets").innerHTML = "Error loading markets";
}

}

loadMarkets();
setInterval(loadMarkets,5000);

</script>

</body>
</html>
