<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Zero Exchange PRO</title>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial}
.page{display:none;padding:20px}
.active{display:block}
.card{background:#141b2d;padding:14px;margin-bottom:10px;border-radius:12px}
button{width:100%;padding:12px;margin-top:10px;background:#f5b942;border:none;font-weight:bold}
input{width:100%;padding:10px;margin-top:8px}
</style>
</head>

<body>

<div class="card">
<button onclick="nav('trade')">Trade</button>
<button onclick="nav('book')">Order Book</button>
</div>

<!-- TRADE -->
<div id="trade" class="page active">

<div class="card">
<h2>Place Order</h2>

<select id="side">
<option value="buy">BUY</option>
<option value="sell">SELL</option>
</select>

<input id="amount" placeholder="Amount (USDT)"/>
<input id="price" placeholder="Price"/>

<button onclick="placeOrder()">Place Order</button>
</div>

<div class="card">
<h3>Last Trade</h3>
<div id="lastTrade">-</div>
</div>

</div>

<!-- ORDER BOOK -->
<div id="book" class="page">

<div class="card">
<h3>Order Book</h3>
<div id="orders"></div>
</div>

</div>

<script>

let orderBook = [];

function placeOrder(){

const side = document.getElementById("side").value;
const amount = Number(document.getElementById("amount").value);
const price = Number(document.getElementById("price").value);

const order = {
side,
amount,
price,
id:Date.now()
};

matchOrder(order);
renderBook();
}

function matchOrder(order){

for(let i=0;i<orderBook.length;i++){

let o = orderBook[i];

if(order.side !== o.side){

if(order.side==="buy" && order.price>=o.price ||
order.side==="sell" && order.price<=o.price){

document.getElementById("lastTrade").innerText =
`TRADED ${order.amount} @ ${o.price}`;

orderBook.splice(i,1);
return;
}
}
}

orderBook.push(order);
}

function renderBook(){

let html="";

orderBook.forEach(o=>{
html+=`
<div class="card">
${o.side.toUpperCase()} - ${o.amount} @ ${o.price}
</div>
`;
});

document.getElementById("orders").innerHTML=html;
}

function nav(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

</script>

</body>
</html>
