<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zero Exchange V12</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(180deg,#020617,#08112b);
color:white;
}

.page{display:none;padding:20px;}
.page.active{display:block;}

.card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
border-radius:20px;
padding:20px;
margin-bottom:15px;
}

button{
cursor:pointer;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="homePage" class="page active">
<div class="card">
<h2>Portfolio</h2>

<div style="font-size:40px;font-weight:900">
<span id="balance">Loading...</span>
</div>

<div style="color:#94a3b8">
USD: <span id="usdBalance">-</span>
</div>
</div>

<button onclick="switchPage('depositPage')">Deposit</button>
<button onclick="switchPage('withdrawPage')">Withdraw</button>
</div>

<!-- DEPOSIT -->
<div id="depositPage" class="page">
<div class="card">
<h2>Deposit Request</h2>

<select id="depositCoin">
<option>USDT</option>
<option>BTC</option>
<option>ETH</option>
</select>

<input id="depositAmount" placeholder="Amount"/>

<button onclick="createDeposit()">Submit Deposit Request</button>
</div>
</div>

<!-- WITHDRAW -->
<div id="withdrawPage" class="page">
<div class="card">
<h2>Withdraw Request</h2>

<select id="withdrawCoin">
<option>USDT</option>
<option>BTC</option>
<option>ETH</option>
</select>

<input id="withdrawAmount" placeholder="Amount"/>
<input id="withdrawAddress" placeholder="Wallet Address"/>

<button onclick="createWithdraw()">Submit Withdraw Request</button>
</div>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
onAuthStateChanged,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc,
updateDoc,
collection,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT",
appId: "YOUR_APP"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

/* AUTH LISTENER */
onAuthStateChanged(auth, async (user)=>{
if(!user) return;

currentUser = user;

const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{
balance: 0,
createdAt: Date.now()
});
}

loadBalance();
});

/* LOAD BALANCE (REAL SOURCE OF TRUTH) */
async function loadBalance(){
const ref = doc(db,"users",currentUser.uid);
const snap = await getDoc(ref);

const data = snap.data();

document.getElementById("balance").innerText = data.balance + " USDT";
document.getElementById("usdBalance").innerText = "$" + data.balance;
}

/* DEPOSIT REQUEST */
window.createDeposit = async function(){

const coin = document.getElementById("depositCoin").value;
const amount = Number(document.getElementById("depositAmount").value);

await addDoc(collection(db,"transactions"),{
uid: currentUser.uid,
type: "deposit",
coin,
amount,
status: "pending",
createdAt: serverTimestamp()
});

alert("Deposit Request Sent");
}

/* WITHDRAW REQUEST */
window.createWithdraw = async function(){

const coin = document.getElementById("withdrawCoin").value;
const amount = Number(document.getElementById("withdrawAmount").value);
const address = document.getElementById("withdrawAddress").value;

if(!amount || !address) return alert("Fill all fields");

await addDoc(collection(db,"transactions"),{
uid: currentUser.uid,
type: "withdraw",
coin,
amount,
address,
status: "pending",
createdAt: serverTimestamp()
});

alert("Withdraw Request Sent");
}

/* SIMPLE NAV */
window.switchPage = function(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");

}

</script>

</body>
</html>
