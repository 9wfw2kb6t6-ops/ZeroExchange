<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#030712;
color:white;
overflow-x:hidden;
}

/* HEADER */

.header{

position:sticky;
top:0;
z-index:999;

display:flex;
justify-content:space-between;
align-items:center;

padding:18px;

background:
rgba(15,23,42,0.95);

backdrop-filter:blur(20px);

border-bottom:
1px solid rgba(255,255,255,0.08);

}

.logo{

font-size:28px;
font-weight:900;
color:#f5b942;

}

/* PAGE */

.page{
padding:18px;
padding-bottom:120px;
}

/* CARD */

.card{

background:
rgba(255,255,255,0.04);

border:
1px solid rgba(255,255,255,0.06);

border-radius:24px;

padding:20px;

margin-bottom:18px;

backdrop-filter:blur(20px);

}

/* BALANCE */

.balance{

font-size:48px;
font-weight:900;

margin-top:10px;

}

/* GRID */

.grid{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:14px;

margin-top:18px;

}

.action{

background:#111827;

padding:24px;

border-radius:18px;

text-align:center;

cursor:pointer;

transition:0.2s;

}

.action:hover{
transform:scale(1.03);
}

/* INPUTS */

input,
select{

width:100%;

padding:14px;

margin-top:12px;

border:none;

border-radius:14px;

background:#0f172a;

color:white;

font-size:15px;

outline:none;

}

button{

width:100%;

padding:14px;

margin-top:14px;

border:none;

border-radius:14px;

font-weight:900;

cursor:pointer;

}

/* BUTTON COLORS */

.primary{

background:
linear-gradient(
90deg,
#f5b942,
#ffe08a
);

color:black;

}

.green-btn{

background:#22c55e;
color:white;

}

.blue-btn{

background:#3b82f6;
color:white;

}

.red-btn{

background:#ef4444;
color:white;

}

/* ROW */

.row{

display:flex;
justify-content:space-between;
align-items:center;

padding:12px 0;

border-bottom:
1px solid rgba(255,255,255,0.06);

}

/* COLORS */

.green{
color:#22c55e;
}

.red{
color:#ef4444;
}

.gray{
color:#94a3b8;
}

/* MARKET */

.market-row{

display:flex;
justify-content:space-between;
align-items:center;

padding:14px 0;

border-bottom:
1px solid rgba(255,255,255,0.06);

}

/* HISTORY */

.history{

background:#0f172a;

padding:14px;

border-radius:14px;

margin-top:12px;

word-break:break-all;

}

/* NAV */

.nav{

position:fixed;

bottom:0;
left:0;

width:100%;

display:grid;

grid-template-columns:
repeat(5,1fr);

background:#0f172a;

padding:10px 0;

border-top:
1px solid rgba(255,255,255,0.08);

}

.nav button{

background:none;
margin:0;
color:white;

}

/* BADGE */

.badge{

display:inline-block;

padding:6px 10px;

border-radius:10px;

font-size:12px;

margin-top:8px;

}

.success{

background:#052e16;
color:#22c55e;

}

.pending{

background:#3f3f46;
color:white;

}

.gateway{

padding:14px;

border-radius:16px;

margin-top:12px;

background:#111827;

border:
1px solid rgba(255,255,255,0.06);

}

.gateway-title{

font-weight:800;
margin-bottom:8px;

}

.live-price{

font-size:13px;
color:#22c55e;

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="logo">
ZERO EXCHANGE
</div>

<div
class="live-price"

>

</div>

</div>

<!-- PAGE -->

<div class="page">

<!-- DASHBOARD -->

<div class="gray">

</div>

class="balance"

</div>

<div class="grid">

<div

onclick="scrollToSection('walletSection')"
>
💼
<div>
Wallet
</div>
</div>

<div
class="action"
onclick="scrollToSection('marketsSection')"
>
📈
<div>

</div>
</div>

<div
class="action"
onclick="scrollToSection('depositSection')"
>
💰
<div>
Deposit
</div>
</div>

<div
class="action"
onclick="scrollToSection('withdrawSection')"
>
🏦
<div>
Withdraw
</div>
</div>

</div>

</div>

<!-- WALLET -->

<div
class="card"
id="walletSection"
>

<h2>
Wallet

<div id="walletList"></div>

</div>

<!-- MARKETS -->

class="card"
id="marketsSection"
>

<!-- FIAT PAYMENT -->

<div class="card">

<h2>

<!-- IRAN -->

</option>

<select id="turkeyGateway">

<option value="iyzico">
iyzico
</option>

<option value="paytr">

</option>

</select>

<input

/>

class="blue-btn"
onclick="payTurkeyGateway()"
>

</button>

</div>

<!-- DEPOSIT -->

<div
class="card"
id="depositSection"
>

<h2>

<select id="depositCoin">

<option value="USDT">
USDT TRC20

<option value="BTC">
BTC

<option value="ETH">

</option>

BNB
</option>

<option value="SOL">
SOL

<option value="TRY">
Turkish Lira
</option>

Iranian Rial
</option>

</select>

<div
class="history"
id="depositAddress"
>
Loading...
</div>

<button
class="primary"
onclick="copyDeposit()"
>
Copy Deposit Info
</button>

<input
type="file"
id="receiptUpload"
/>

<button
class="green-btn"
onclick="submitReceipt()"
>
Submit Payment Receipt
</button>

<div id="depositHistory"></div>

</div>

<!-- WITHDRAW -->

<div
class="card"
id="withdrawSection"
>

<h2>
Withdraw
</h2>

<select id="withdrawCoin">

<option value="USDT">
USDT
</option>

<option value="BTC">
BTC
</option>

<option value="ETH">
ETH
</option>

<option value="TON">
TON
</option>

<option value="BNB">
BNB
</option>

<option value="SOL">
SOL
</option>

<option value="TRY">
TRY
</option>

<option value="IRR">
IRR
</option>

</select>

<input
id="withdrawAmount"
placeholder="Amount"
/>

<input
id="withdrawAddress"
placeholder="Wallet / Bank Address"
/>

<button
class="red-btn"
onclick="withdraw()"
>
Submit Withdraw
</button>

<div id="withdrawHistory"></div>

</div>

</div>

<!-- NAV -->

<div class="nav">

<button onclick="scrollTo(0,0)">
Home
</button>

<button onclick="scrollToSection('marketsSection')">
Markets
</button>

<button onclick="scrollToSection('walletSection')">
Wallet
</button>

<button onclick="scrollToSection('depositSection')">
Deposit
</button>

<button onclick="scrollToSection('withdrawSection')">
Withdraw
</button>

</div>

<script>

/* =========================
   MARKET PRICES
========================= */

const marketSymbols = [

"BTCUSDT",
"ETHUSDT",
"BNBUSDT",
"SOLUSDT",
"XRPUSDT",
"DOGEUSDT",
"TONUSDT"

];

let prices = {};

async function loadMarkets(){

let html = "";

for(let symbol of marketSymbols){

try{

const res =
await fetch(
`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`
);

const data =
await res.json();

prices[symbol] =
Number(data.price);

html += `

<div class="market-row">

<div>
${symbol}
</div>

<div class="green">
$${Number(data.price).toFixed(2)}
</div>

</div>

`;

}catch(e){}

}

document
.getElementById("markets")
.innerHTML =
html;

document
.getElementById("btcLive")
.innerText =
"BTC $" +
(prices.BTCUSDT || 0).toFixed(2);

renderWallet();

}

setInterval(loadMarkets,5000);
loadMarkets();

/* =========================
   WALLET
========================= */

let wallet = {

USDT:5000,
BTC:0.5,
ETH:4,
TON:500,
BNB:10,
SOL:80,
XRP:5000,
DOGE:12000,
TRY:100000,
IRR:900000000

};

function renderWallet(){

let html = "";

for(let coin in wallet){

html += `

<div class="row">

<div>
${coin}
</div>

<div>
${wallet[coin]}
</div>

</div>

`;

}

document
.getElementById("walletList")
.innerHTML =
html;

let total =

wallet.USDT +

(wallet.BTC * (prices.BTCUSDT || 0)) +

(wallet.ETH * (prices.ETHUSDT || 0)) +

(wallet.BNB * (prices.BNBUSDT || 0));

document
.getElementById("portfolio")
.innerText =
"$" +
total.toFixed(2);

}

/* =========================
   DEPOSIT ADDRESSES
========================= */

const depositWallets = {

USDT:
"TBiEV2wCiyuLQ6J8uumc2Z6UYNoNYkK6jg",

BTC:
"bc1qd9ah0wegkkne47n3qsqr9xqkvjypfmz2km78jw",

ETH:
"0x84496f0996ea96871DED409428D060dB00cb9136",

TON:
"UQD0VN0pXVlqLkkktfO8NmjaUkU3FMotFAre6vwWJlFCA6IP",

BNB:
"0x84496f0996ea96871DED409428D060dB00cb9136",

SOL:
"652afoXHAveb4RBpHa8g5iE9nL8RaZKhf2A3j7qBthtJ",

TRY:
`BANK: Ziraat Bank
IBAN: TR42 0001 0090 1098 8248 3050 01
NAME: NARIMAN2N ALIZADEH KORDMAHALEH`,

IRR:
`BANK: TEJARAT
CARD: 5859831204847882
SHEBA: IR300180000000004613967414
NAME: Nariman Alizadeh Kordmahaleh`

};

function updateDepositAddress(){

const coin =
document
.getElementById("depositCoin")
.value;

document
.getElementById("depositAddress")
.innerText =
depositWallets[coin];

}

document
.getElementById("depositCoin")
.addEventListener(
"change",
updateDepositAddress
);

updateDepositAddress();

/* =========================
   COPY
========================= */

function copyDeposit(){

navigator.clipboard.writeText(

document
.getElementById("depositAddress")
.innerText

);

alert("Copied");

}

/* =========================
   RECEIPT SYSTEM
========================= */

let deposits = [];

function submitReceipt(){

const coin =
document
.getElementById("depositCoin")
.value;

const file =
document
.getElementById("receiptUpload")
.files[0];

if(!file){

alert("Upload receipt");

return;

}

deposits.push({

coin,

status:"Pending Review",

time:
new Date()
.toLocaleTimeString()

});

renderDeposits();

alert(
"Receipt Submitted Successfully"
);

}

function renderDeposits(){

document
.getElementById("depositHistory")
.innerHTML =

deposits
.slice()
.reverse()
.map(d=>`

<div class="history">

🟢 ${d.coin}

<div class="badge pending">
${d.status}
</div>

<div class="gray">
${d.time}
</div>

</div>

`).join("");

}

/* =========================
   WITHDRAW
========================= */

let withdraws = [];

function withdraw(){

const coin =
document
.getElementById("withdrawCoin")
.value;

const amount =
Number(
document
.getElementById("withdrawAmount")
.value
);

const address =
document
.getElementById("withdrawAddress")
.value;

if(!amount || !address){

alert("Fill all inputs");

return;

}

if(wallet[coin] < amount){

alert("Insufficient balance");

return;

}

wallet[coin] -= amount;

withdraws.push({

coin,
amount,
address,

status:"Pending",

time:
new Date()
.toLocaleTimeString()

});

renderWithdraws();
renderWallet();

}

function renderWithdraws(){

document
.getElementById("withdrawHistory")
.innerHTML =

withdraws
.slice()
.reverse()
.map(w=>`

<div class="history">

🔴 ${w.amount} ${w.coin}

<div class="badge pending">
${w.status}
</div>

<div class="gray">
${w.address}
</div>

</div>

`).join("");

}

/* =========================
   REAL PAYMENT GATEWAYS
========================= */

/*
IRAN GATEWAY
Replace URL with backend API
*/

function payIranGateway(){

const gateway =
document
.getElementById("iranGateway")
.value;

const amount =
document
.getElementById("iranAmount")
.value;

if(!amount){

alert("Enter amount");

return;

}

/*
BACKEND API EXAMPLE:

POST /api/iran-payment

{
 gateway:"zarinpal",
 amount:500000
}

RETURN:
payment_url
*/

alert(
"Redirecting To " +
gateway.toUpperCase()
);

/*
window.location.href =
backend_payment_url;
*/

}

/*
TURKEY GATEWAY
*/

function payTurkeyGateway(){

const gateway =
document
.getElementById("turkeyGateway")
.value;

const amount =
document
.getElementById("turkeyAmount")
.value;

if(!amount){

alert("Enter amount");

return;

}

alert(
"Redirecting To " +
gateway.toUpperCase()
);

/*
window.location.href =
backend_payment_url;
*/

}

/* =========================
   SCROLL
========================= */

function scrollToSection(id){

document
.getElementById(id)
.scrollIntoView({

behavior:"smooth"

});

}

/* INIT */

renderWallet();

</script>

</body>
</html>
