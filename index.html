<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zero Exchange UI Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet"/>

<style>

body{
margin:0;
font-family:Inter;
background:#0b1020;
color:white;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 18px;
background:#0f172a;
position:sticky;
top:0;
z-index:10;
}

.logo{
font-weight:900;
font-size:18px;
}

.badge{
font-size:12px;
background:#22c55e;
padding:4px 8px;
border-radius:8px;
}

/* PAGES */
.page{display:none;padding:16px;}
.active{display:block;}

/* CARD */
.card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
padding:16px;
border-radius:16px;
margin-bottom:12px;
backdrop-filter:blur(10px);
}

/* BALANCE HERO */
.balance{
font-size:34px;
font-weight:900;
margin-top:6px;
}

.sub{
color:#94a3b8;
font-size:13px;
}

/* GRID ACTIONS */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:12px;
}

.action{
background:#141b2d;
padding:18px;
border-radius:14px;
text-align:center;
font-weight:600;
cursor:pointer;
}

/* MARKET */
.market{
display:flex;
justify-content:space-between;
padding:14px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
}

/* BOTTOM NAV */
.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
justify-content:space-around;
background:#0f172a;
padding:10px 0;
border-top:1px solid rgba(255,255,255,0.06);
}

.nav button{
background:none;
border:none;
color:#94a3b8;
font-size:12px;
display:flex;
flex-direction:column;
align-items:center;
gap:4px;
}

.nav button.active{
color:#f5b942;
}

.icon{
font-size:18px;
}

</style>

</head>

<body>

<!-- TOP -->
<div class="topbar">
<div class="logo">Zero Exchange</div>
<div class="badge">LIVE</div>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="card">
<div class="sub">Total Portfolio</div>
<div class="balance" id="balance">₺0</div>
<div class="sub">≈ $0 USD</div>

<div class="grid">
<div class="action" onclick="nav('markets')">Markets</div>
<div class="action" onclick="nav('wallet')">Wallet</div>
<div class="action" onclick="nav('trade')">Trade</div>
<div class="action" onclick="nav('deposit')">Deposit</div>
</div>
</div>

</div>

<!-- WALLET -->
<div id="wallet" class="page">

<div class="card">
<h3>Assets</h3>
<div id="assets"></div>
</div>

</div>

<!-- MARKETS -->
<div id="markets" class="page">

<div class="card">
<h3>Market Overview</h3>
<div id="marketBox">Loading...</div>
</div>

</div>

<!-- TRADE -->
<div id="trade" class="page">

<div class="card">
<h3>Quick Trade</h3>

<select>
<option>BTC/USDT</option>
<option>ETH/USDT</option>
<option>TON/USDT</option>
</select>

<input placeholder="Amount"/>

<div class="grid">
<div class="action">BUY</div>
<div class="action">SELL</div>
</div>

</div>

</div>

<!-- DEPOSIT -->
<div id="deposit" class="page">

<div class="card">
<h3>Deposit</h3>
<input placeholder="Amount"/>
<button style="width:100%;padding:14px;background:#f5b942;border:none;border-radius:12px;font-weight:800;">
Send Request
</button>
</div>

</div>

<!-- NAV -->
<div class="nav">

<button onclick="nav('home')" class="active">
<div class="icon">🏠</div>
Home
</button>

<button onclick="nav('markets')">
<div class="icon">📊</div>
Markets
</button>

<button onclick="nav('trade')">
<div class="icon">⚡</div>
Trade
</button>

<button onclick="nav('wallet')">
<div class="icon">💰</div>
Wallet
</button>

<button onclick="nav('deposit')">
<div class="icon">⬆️</div>
Deposit
</button>

</div>

<script>

/* NAV */
function nav(id){

document.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));

document.getElementById(id).classList.add("active");

}

/* DEMO DATA */
const assets = [
"USDT: 1200",
"BTC: 0.021",
"ETH: 1.4",
"TON: 300"
];

document.getElementById("assets").innerHTML =
assets.map(a=>`<div class="market">${a}</div>`).join("");

/* SAFE MARKET UI */
async function loadMarkets(){

try{

const r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,toncoin&vs_currencies=usd");
const d = await r.json();

document.getElementById("marketBox").innerHTML = `
<div class="market"><span>BTC</span><span>$${d.bitcoin.usd}</span></div>
<div class="market"><span>ETH</span><span>$${d.ethereum.usd}</span></div>
<div class="market"><span>TON</span><span>$${d.toncoin.usd}</span></div>
`;

}catch(e){
document.getElementById("marketBox").innerHTML="Market offline";
}

}

loadMarkets();

</script>

</body>
</html>
