<!-- ZERO EXCHANGE V8 FINAL FIXED VERSION -->
<!-- ===================================== -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zero Exchange V8</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet"
/>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:
  linear-gradient(
    180deg,
    #020617,
    #0f172a
  );

  color:white;

  font-family:'Inter',sans-serif;

  overflow-x:hidden;

}

/* AUTH */

#authPage{

  position:fixed;

  inset:0;

  background:#020617;

  display:flex;

  justify-content:center;

  align-items:center;

  z-index:99999;

}

.auth-card{

  width:380px;

  background:
  rgba(255,255,255,0.04);

  border:
  1px solid rgba(255,255,255,0.08);

  padding:35px;

  border-radius:30px;

  backdrop-filter:blur(20px);

}

.logo{

  text-align:center;

  font-size:42px;

  font-weight:900;

  margin-bottom:25px;

  background:
  linear-gradient(
    90deg,
    #f5b942,
    #ffe39a
  );

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;

}

input,
select{

  width:100%;

  padding:16px;

  margin-top:14px;

  border:none;

  border-radius:15px;

  background:#0f172a;

  color:white;

  font-size:15px;

}

.auth-btn{

  width:100%;

  margin-top:18px;

  padding:15px;

  border:none;

  border-radius:16px;

  background:
  linear-gradient(
    90deg,
    #f5b942,
    #ffdf8f
  );

  color:black;

  font-weight:900;

  cursor:pointer;

}

.switch-btn{

  margin-top:18px;

  text-align:center;

  color:#94a3b8;

  cursor:pointer;

}

/* APP */

#app{

  display:none;

  padding-bottom:120px;

}

/* HEADER */

.header{

  position:sticky;

  top:0;

  z-index:999;

  padding:18px 20px;

  background:
  rgba(2,6,23,0.9);

  border-bottom:
  1px solid rgba(255,255,255,0.06);

  backdrop-filter:blur(18px);

  display:flex;

  justify-content:space-between;

  align-items:center;

}

.header-left{

  display:flex;

  align-items:center;

  gap:14px;

}

.avatar{

  width:46px;

  height:46px;

  border-radius:50%;

  background:
  linear-gradient(
    135deg,
    #f5b942,
    #ffdf8f
  );

  display:flex;

  justify-content:center;

  align-items:center;

  font-weight:900;

  color:black;

}

.title{

  font-size:24px;

  font-weight:900;

}

.sub{

  color:#94a3b8;

  font-size:13px;

}

.logout-btn{

  width:44px;

  height:44px;

  border:none;

  border-radius:14px;

  background:#ef4444;

  color:white;

  cursor:pointer;

  font-size:18px;

}

/* PAGE */

.page{

  display:none;

  padding:20px;

}

.page.active{

  display:block;

}

/* CARD */

.card{

  background:
  rgba(255,255,255,0.04);

  border:
  1px solid rgba(255,255,255,0.06);

  border-radius:26px;

  padding:22px;

  margin-bottom:20px;

  backdrop-filter:blur(16px);

}

/* BALANCE */

.balance{

  font-size:44px;

  font-weight:900;

}

.balance-sub{

  margin-top:8px;

  color:#94a3b8;

}

/* ACTIONS */

.actions{

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:12px;

  margin-top:22px;

}

.action{

  background:
  rgba(255,255,255,0.04);

  border-radius:18px;

  padding:18px 10px;

  text-align:center;

}

.action i{

  color:#f5b942;

  font-size:24px;

  margin-bottom:10px;

}

/* MARKETS */

.market{

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:18px 0;

  border-bottom:
  1px solid rgba(255,255,255,0.06);

}

.coin{

  display:flex;

  align-items:center;

  gap:12px;

}

.coin-icon{

  width:46px;

  height:46px;

  border-radius:50%;

  background:#111827;

  display:flex;

  justify-content:center;

  align-items:center;

  font-weight:800;

}

.green{

  color:#22c55e;

}

/* DEPOSIT */

.deposit-title{

  font-size:22px;

  font-weight:800;

  margin-bottom:18px;

}

.deposit-box{

  background:#0f172a;

  padding:15px;

  border-radius:14px;

  margin-top:12px;

  word-break:break-all;

}

.copy-btn{

  width:100%;

  margin-top:14px;

  padding:14px;

  border:none;

  border-radius:14px;

  background:
  linear-gradient(
    90deg,
    #f5b942,
    #ffdf8f
  );

  color:black;

  font-weight:900;

  cursor:pointer;

}

/* NAV */

.bottom-nav{

  position:fixed;

  bottom:0;

  left:0;

  width:100%;

  background:
  rgba(2,6,23,0.92);

  border-top:
  1px solid rgba(255,255,255,0.06);

  display:grid;

  grid-template-columns:
  repeat(5,1fr);

  padding:10px 0;

  backdrop-filter:blur(18px);

}

.nav-btn{

  background:none;

  border:none;

  color:#94a3b8;

  display:flex;

  flex-direction:column;

  align-items:center;

  gap:6px;

  font-size:12px;

}

.nav-btn i{

  font-size:22px;

}

.nav-btn.active{

  color:#f5b942;

}

@media(max-width:650px){

  .actions{

    grid-template-columns:
    repeat(2,1fr);

  }

}

</style>

</head>

<body>

<!-- AUTH -->

<div id="authPage">

  <div class="auth-card">

    <div class="logo">
      ZERO X
    </div>

    <input
      id="email"
      type="email"
      placeholder="Email"
    >

    <input
      id="password"
      type="password"
      placeholder="Password"
    >

    <button
      class="auth-btn"
      id="loginBtn"
    >
      Login
    </button>

    <div
      class="switch-btn"
      id="registerBtn"
    >
      Create Account
    </div>

  </div>

</div>

<!-- APP -->

<div id="app">

  <!-- HEADER -->

  <div class="header">

    <div class="header-left">

      <div class="avatar">
        Z
      </div>

      <div>

        <div class="title">
          Zero Exchange
        </div>

        <div class="sub">
          Professional Crypto Exchange
        </div>

      </div>

    </div>

    <button
      class="logout-btn"
      id="logoutBtn"
    >
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>

  </div>

  <!-- HOME -->

  <div class="page active" id="homePage">

    <div class="card">

      <div style="color:#94a3b8">
        Total Balance
      </div>

      <div class="balance">
        ₺98,613
      </div>

      <div class="balance-sub">
        ≈ $2,981
      </div>

      <div class="actions">

        <div class="action">
          <i class="fa-solid fa-wallet"></i>
          <div>Wallet</div>
        </div>

        <div class="action">
          <i class="fa-solid fa-arrow-down"></i>
          <div>Deposit</div>
        </div>

        <div class="action">
          <i class="fa-solid fa-arrow-up"></i>
          <div>Withdraw</div>
        </div>

        <div class="action">
          <i class="fa-solid fa-chart-line"></i>
          <div>Trade</div>
        </div>

      </div>

    </div>

  </div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

  getAuth,

  signInWithEmailAndPassword,

  createUserWithEmailAndPassword,

  onAuthStateChanged,

  signOut

}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* REAL FIREBASE CONFIG */

const firebaseConfig = {

  apiKey:
  "AIzaSyDFXmpsyGrKxUlaRj_sP1gTaaUJdsdtLps",

  authDomain:
  "zero-exchange-v5.firebaseapp.com",

  projectId:
  "zero-exchange-v5",

  storageBucket:
  "zero-exchange-v5.firebasestorage.app",

  messagingSenderId:
  "430232197516",

  appId:
  "1:430232197516:web:8abcd54749b17acc791ea9",

  measurementId:
  "G-DNJ0V10CG2"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

/* LOGIN */

async function login(){

  const email =
  document.getElementById(
    "email"
  ).value.trim();

  const password =
  document.getElementById(
    "password"
  ).value;

  if(!email || !password){

    alert(
      "Enter email/password"
    );

    return;

  }

  try{

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    alert("Login Success");

  }catch(error){

    alert(error.message);

    console.error(error);

  }

}

/* REGISTER */

async function register(){

  const email =
  document.getElementById(
    "email"
  ).value.trim();

  const password =
  document.getElementById(
    "password"
  ).value;

  if(!email || !password){

    alert(
      "Enter email/password"
    );

    return;

  }

  try{

    await createUserWithEmailAndPassword(
      auth,
      email,
      password
    );

    alert(
      "Account Created"
    );

  }catch(error){

    alert(error.message);

  }

}

/* AUTH STATE */

onAuthStateChanged(
auth,
(user)=>{

  if(user){

    document.getElementById(
      "authPage"
    ).style.display = "none";

    document.getElementById(
      "app"
    ).style.display = "block";

  }

}
);

/* LOGOUT */

async function logout(){

  await signOut(auth);

  location.reload();

}

/* EVENTS */

document
.getElementById("loginBtn")
.addEventListener(
  "click",
  login
);

document
.getElementById("registerBtn")
.addEventListener(
  "click",
  register
);

document
.getElementById("logoutBtn")
.addEventListener(
  "click",
  logout
);

</script>

</body>
</html>
