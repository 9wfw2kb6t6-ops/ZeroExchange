<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zero Exchange X</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet"
>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:'Inter',sans-serif;

  background:
  radial-gradient(circle at top,#1e293b,#020617 70%);

  color:white;

  min-height:100vh;

  overflow-x:hidden;

}

/* NAVBAR */

.navbar{

  width:100%;

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:20px 30px;

  backdrop-filter:blur(15px);

  background:rgba(255,255,255,0.03);

  border-bottom:
  1px solid rgba(255,255,255,0.08);

  position:sticky;

  top:0;

  z-index:999;

}

.logo{

  font-size:28px;

  font-weight:700;

  background:linear-gradient(
    90deg,
    #f5b942,
    #ffe39a
  );

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;

}

.nav-right{

  display:flex;

  gap:15px;

  align-items:center;

}

.balance{

  background:rgba(255,255,255,0.04);

  padding:10px 16px;

  border-radius:12px;

  font-size:14px;

}

.logout-btn{

  border:none;

  padding:10px 16px;

  border-radius:12px;

  background:#ff4d4d;

  color:white;

  font-weight:600;

  cursor:pointer;

}

/* HERO */

.hero{

  padding:30px;

  display:grid;

  grid-template-columns:1.4fr 0.9fr;

  gap:25px;

}

.glass{

  background:rgba(255,255,255,0.04);

  border:1px solid rgba(255,255,255,0.08);

  border-radius:26px;

  backdrop-filter:blur(20px);

  padding:25px;

  box-shadow:
  0 0 40px rgba(0,0,0,0.3);

}

/* CHART */

.chart-box{

  width:100%;

  overflow:hidden;

  border-radius:22px;

  border:1px solid rgba(255,255,255,0.06);

}

/* MARKET */

.market-grid{

  margin-top:20px;

  display:grid;

  grid-template-columns:repeat(3,1fr);

  gap:15px;

}

.coin{

  background:rgba(255,255,255,0.04);

  padding:18px;

  border-radius:18px;

  transition:0.3s;

}

.coin:hover{

  transform:translateY(-4px);

  background:rgba(255,255,255,0.06);

}

.coin h3{

  margin-bottom:10px;

}

.green{
  color:#00ffae;
}

.red{
  color:#ff647c;
}

/* TRADE */

.trade-box h2{

  margin-bottom:20px;

}

input,select{

  width:100%;

  padding:14px;

  margin-top:12px;

  border:none;

  border-radius:14px;

  background:#0f172a;

  color:white;

  font-size:15px;

}

.trade-btn{

  width:100%;

  margin-top:18px;

  padding:15px;

  border:none;

  border-radius:16px;

  background:linear-gradient(
    90deg,
    #f5b942,
    #ffdd88
  );

  color:black;

  font-weight:700;

  cursor:pointer;

  transition:0.3s;

}

.trade-btn:hover{

  transform:scale(1.02);

}

/* ORDERS */

.orders{

  padding:0 30px 40px;

}

.orders h2{

  margin-bottom:20px;

}

.order-card{

  background:rgba(255,255,255,0.04);

  border:1px solid rgba(255,255,255,0.06);

  padding:20px;

  border-radius:20px;

  margin-bottom:15px;

  transition:0.3s;

}

.order-card:hover{

  transform:translateY(-4px);

}

/* LOGIN */

#loginBox{

  position:fixed;

  inset:0;

  display:flex;

  justify-content:center;

  align-items:center;

  background:#020617;

  z-index:9999;

}

.login-card{

  width:360px;

}

.login-title{

  text-align:center;

  font-size:30px;

  font-weight:700;

  margin-bottom:25px;

}

.login-btn{

  width:100%;

  margin-top:18px;

  padding:15px;

  border:none;

  border-radius:16px;

  background:linear-gradient(
    90deg,
    #f5b942,
    #ffdf8f
  );

  font-weight:700;

  cursor:pointer;

}

/* MOBILE */

@media(max-width:900px){

  .hero{

    grid-template-columns:1fr;

  }

  .market-grid{

    grid-template-columns:1fr;

  }

}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginBox">

  <div class="glass login-card">

    <div class="login-title">
      Zero Exchange X
    </div>

    <input
      id="email"
      type="email"
      placeholder="Email"
    >

    <input
      id="password"
      type="password"
      placeholder="Password"
    >

    <button
      class="login-btn"
      id="loginBtn"
    >
      Login
    </button>

  </div>

</div>

<!-- APP -->

<div id="app" style="display:none;">

  <!-- NAVBAR -->

  <div class="navbar">

    <div class="logo">
      ZERO X
    </div>

    <div class="nav-right">

      <div class="balance">
        Balance: 24,580 USDT
      </div>

      <button
        class="logout-btn"
        id="logoutBtn"
      >
        Logout
      </button>

    </div>

  </div>

  <!-- HERO -->

  <div class="hero">

    <!-- LEFT -->

    <div class="glass">

      <!-- CHART -->

      <div class="chart-box">

        <div id="tradingview_chart"></div>

      </div>

      <!-- MARKET -->

      <div class="market-grid">

        <div class="coin">

          <h3>BTC/USDT</h3>

          <p>$104,225</p>

          <br>

          <span class="green">
            +3.21%
          </span>

        </div>

        <div class="coin">

          <h3>ETH/USDT</h3>

          <p>$5,140</p>

          <br>

          <span class="green">
            +2.08%
          </span>

        </div>

        <div class="coin">

          <h3>SOL/USDT</h3>

          <p>$202</p>

          <br>

          <span class="red">
            -1.22%
          </span>

        </div>

      </div>

    </div>

    <!-- TRADE -->

    <div class="glass trade-box">

      <h2>Create Order</h2>

      <select id="from">

        <option>USDT</option>
        <option>BTC</option>
        <option>ETH</option>

      </select>

      <input
        id="amount"
        type="number"
        placeholder="Amount"
      >

      <select id="to">

        <option>BTC</option>
        <option>ETH</option>
        <option>USDT</option>

      </select>

      <button
        class="trade-btn"
        id="submitBtn"
      >
        Submit Order
      </button>

    </div>

  </div>

  <!-- ORDERS -->

  <div class="orders">

    <h2>Recent Orders</h2>

    <div id="orders"></div>

  </div>

</div>

<!-- TRADINGVIEW -->

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

window.addEventListener("load",()=>{

  new TradingView.widget({

    width:"100%",

    height:420,

    symbol:"BINANCE:BTCUSDT",

    interval:"15",

    timezone:"Etc/UTC",

    theme:"dark",

    style:"1",

    locale:"en",

    toolbar_bg:"#0f172a",

    enable_publishing:false,

    hide_side_toolbar:false,

    allow_symbol_change:true,

    container_id:"tradingview_chart"

  });

});

</script>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

  apiKey: "AIzaSyDFXmpsyGrKxUlaRj_sP1gTaaUJdsdtLps",

  authDomain:
    "zero-exchange-v5.firebaseapp.com",

  projectId:
    "zero-exchange-v5",

  storageBucket:
    "zero-exchange-v5.firebasestorage.app",

  messagingSenderId:
    "430232197516",

  appId:
    "1:430232197516:web:8abcd54749b17acc791ea9",

  measurementId:
    "G-DNJ0V10CG2"

};

/* INIT */

const app =
  initializeApp(firebaseConfig);

const db =
  getFirestore(app);

const auth =
  getAuth(app);

/* LOGIN */

async function login(){

  const email =
    document.getElementById("email")
    .value
    .trim();

  const password =
    document.getElementById("password")
    .value;

  if(!email || !password){

    alert("Enter email and password");
    return;

  }

  try{

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

  }catch(error){

    alert(error.message);

  }

}

/* LOGOUT */

async function logout(){

  await signOut(auth);

  location.reload();

}

/* AUTH */

onAuthStateChanged(auth,(user)=>{

  if(user){

    document.getElementById(
      "loginBox"
    ).style.display = "none";

    document.getElementById(
      "app"
    ).style.display = "block";

    loadOrders();

  }

});

/* CREATE ORDER */

async function createOrder(){

  const from =
    document.getElementById("from").value;

  const to =
    document.getElementById("to").value;

  const amount =
    document.getElementById("amount").value;

  if(!amount){

    alert("Enter amount");
    return;

  }

  await addDoc(

    collection(db,"orders"),

    {

      from,
      to,

      amount:Number(amount),

      status:"pending",

      email:auth.currentUser.email,

      createdAt:
      new Date().toLocaleString()

    }

  );

  document.getElementById(
    "amount"
  ).value = "";

}

/* LOAD ORDERS */

function loadOrders(){

  onSnapshot(

    collection(db,"orders"),

    (snapshot)=>{

      const orders =
        document.getElementById("orders");

      orders.innerHTML = "";

      snapshot.forEach((doc)=>{

        const order = doc.data();

        orders.innerHTML += `

          <div class="order-card">

            <h3>
              ${order.from}
              →
              ${order.to}
            </h3>

            <br>

            Amount:
            ${order.amount}

            <br><br>

            User:
            ${order.email}

            <br><br>

            Status:
            ${order.status}

            <br><br>

            ${order.createdAt}

          </div>

        `;

      });

    }

  );

}

/* BUTTON EVENTS */

window.addEventListener(
  "DOMContentLoaded",
  ()=>{

    const loginBtn =
      document.getElementById(
        "loginBtn"
      );

    const logoutBtn =
      document.getElementById(
        "logoutBtn"
      );

    const submitBtn =
      document.getElementById(
        "submitBtn"
      );

    if(loginBtn){

      loginBtn.addEventListener(
        "click",
        login
      );

    }

    if(logoutBtn){

      logoutBtn.addEventListener(
        "click",
        logout
      );

    }

    if(submitBtn){

      submitBtn.addEventListener(
        "click",
        createOrder
      );

    }

  }

);

</script>

</body>
</html>
