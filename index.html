<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>ZERO EXCHANGE REAL</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap"
rel="stylesheet"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#050816;
color:white;
overflow-x:hidden;
}

/* HEADER */

.header{

position:sticky;
top:0;
z-index:999;

display:flex;
justify-content:space-between;
align-items:center;

padding:18px;

background:#0f172a;

border-bottom:
1px solid rgba(255,255,255,0.08);

backdrop-filter:blur(20px);

}

.logo{

font-size:28px;
font-weight:900;

color:#f5b942;

}

.live-box{

display:flex;
gap:12px;
align-items:center;

}

.live{

font-size:13px;
color:#22c55e;

}

/* PAGE */

.page{

padding:18px;
padding-bottom:120px;

}

/* CARD */

.card{

background:
rgba(255,255,255,0.04);

border:
1px solid rgba(255,255,255,0.06);

border-radius:24px;

padding:20px;

margin-bottom:18px;

backdrop-filter:blur(18px);

}

/* BALANCE */

.balance{

font-size:46px;
font-weight:900;

margin-top:10px;

}

.sub{

font-size:13px;
color:#94a3b8;

margin-top:8px;

}

/* GRID */

.grid{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:14px;

margin-top:20px;

}

.action{

background:#111827;

padding:24px;

border-radius:18px;

text-align:center;

cursor:pointer;

transition:0.2s;

}

.action:hover{

transform:scale(1.03);

}

.action-title{

margin-top:10px;

font-weight:700;

}

/* INPUT */

input,
select{

width:100%;

padding:14px;

margin-top:12px;

border:none;

border-radius:14px;

background:#0f172a;

color:white;

font-size:15px;

outline:none;

}

button{

width:100%;

padding:14px;

margin-top:14px;

border:none;

border-radius:14px;

background:
linear-gradient(
90deg,
#f5b942,
#ffe08a
);

color:black;

font-weight:900;

cursor:pointer;

}

/* ROW */

.row{

display:flex;
justify-content:space-between;
align-items:center;

padding:12px 0;

border-bottom:
1px solid rgba(255,255,255,0.06);

}

/* COLORS */

.green{
color:#22c55e;
}

.red{
color:#ef4444;
}

.gray{
color:#94a3b8;
}

.yellow{
color:#f5b942;
}

/* MARKET */

.market-row{

display:flex;
justify-content:space-between;
align-items:center;

padding:14px 0;

border-bottom:
1px solid rgba(255,255,255,0.06);

}

.coin{

display:flex;
align-items:center;
gap:12px;

}

.coin-icon{

width:42px;
height:42px;

border-radius:50%;

background:#111827;

display:flex;
justify-content:center;
align-items:center;

font-weight:900;

}

.small{

font-size:12px;
color:#94a3b8;

}

/* QR */

.qr{

width:180px;
height:180px;

margin:20px auto;

background:white;

border-radius:20px;

display:flex;
justify-content:center;
align-items:center;

color:black;

font-weight:900;

}

/* HISTORY */

.history{

background:#0f172a;

padding:14px;

border-radius:14px;

margin-top:12px;

word-break:break-all;

}

/* NAV */

.nav{

position:fixed;

bottom:0;
left:0;

width:100%;

display:grid;

grid-template-columns:
repeat(5,1fr);

background:#0f172a;

padding:10px 0;

border-top:
1px solid rgba(255,255,255,0.08);

}

.nav button{

background:none;

color:white;

font-size:13px;

margin:0;

}

/* TABLE */

.table{

overflow-x:auto;

}

.trade-row{

display:grid;

grid-template-columns:
1fr 1fr 1fr;

padding:12px 0;

border-bottom:
1px solid rgba(255,255,255,0.06);

}

.badge{

padding:6px 10px;

border-radius:10px;

font-size:12px;

display:inline-block;

margin-top:6px;

}

.buy{

background:#052e16;
color:#22c55e;

}

.sell{

background:#450a0a;
color:#ef4444;

}

.pending{

background:#3f3f46;
color:white;

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="logo">
ZERO EXCHANGE
</div>

<div class="live-box">

<div
class="live"
id="btcLive"
>
BTC Loading...
</div>

<div
class="live"
id="ethLive"
>
ETH Loading...
</div>

</div>

</div>

<!-- PAGE -->

<div class="page">

<!-- DASHBOARD -->

<div class="card">

<div class="gray">
Total Portfolio
</div>

<div
class="balance"
id="portfolio"
>
$0.00
</div>

<div class="sub">
Real-Time Crypto Exchange System
</div>

<div class="grid">

<div
class="action"
onclick="scrollToSection('walletSection')"
>
💼
<div class="action-title">
Wallet
</div>
</div>

<div
class="action"
onclick="scrollToSection('marketsSection')"
>
📈
<div class="action-title">
Markets
</div>
</div>

<div
class="action"
onclick="scrollToSection('depositSection')"
>
💰
<div class="action-title">
Deposit
</div>
</div>

<div
class="action"
onclick="scrollToSection('withdrawSection')"
>
🏦
<div class="action-title">
Withdraw
</div>
</div>

</div>

</div>

<!-- WALLET -->

<div
class="card"
id="walletSection"
>

<h2>
Wallet Assets
</h2>

<div id="walletList"></div>

</div>

<!-- MARKETS -->

<div
class="card"
id="marketsSection"
>

<h2>
Live Markets
</h2>

<div id="markets"></div>

</div>

<!-- DEPOSIT -->

<div
class="card"
id="depositSection"
>

<h2>
Deposit System
</h2>

<select id="depositCoin">

<option value="USDT">
USDT TRC20
</option>

<option value="BTC">
BTC
</option>

<option value="ETH">
ETH
</option>

<option value="TON">
TON
</option>

<option value="BNB">
BNB
</option>

<option value="SOL">
SOL
</option>

<option value="TRY">
Turkish Lira
</option>

<option value="IRR">
Iranian Rial
</option>

</select>

<div class="qr">
QR CODE
</div>

<div
class="history"
id="depositAddress"
>
Loading...
</div>

<button onclick="copyDeposit()">
Copy Deposit Info
</button>

<button onclick="fakeDeposit()">
Simulate Deposit
</button>

<div id="depositHistory"></div>

</div>

<!-- WITHDRAW -->

<div
class="card"
id="withdrawSection"
>

<h2>
Withdraw System
</h2>

<select id="withdrawCoin">

<option value="USDT">
USDT
</option>

<option value="BTC">
BTC
</option>

<option value="ETH">
ETH
</option>

<option value="TON">
TON
</option>

<option value="BNB">
BNB
</option>

<option value="SOL">
SOL
</option>

<option value="TRY">
TRY
</option>

<option value="IRR">
IRR
</option>

</select>

<input
id="withdrawAmount"
placeholder="Amount"
/>

<input
id="withdrawAddress"
placeholder="Wallet / Bank Address"
/>

<button onclick="withdraw()">
Submit Withdraw
</button>

<div id="withdrawHistory"></div>

</div>

<!-- TRADE -->

<div class="card">

<h2>
Professional Trading
</h2>

<select id="tradePair">

<option value="BTCUSDT">
BTC/USDT
</option>

<option value="ETHUSDT">
ETH/USDT
</option>

<option value="TONUSDT">
TON/USDT
</option>

<option value="BNBUSDT">
BNB/USDT
</option>

<option value="SOLUSDT">
SOL/USDT
</option>

</select>

<select id="tradeSide">

<option value="buy">
BUY
</option>

<option value="sell">
SELL
</option>

</select>

<input
id="tradePrice"
placeholder="Price"
/>

<input
id="tradeAmount"
placeholder="Amount"
/>

<button onclick="placeOrder()">
Place Order
</button>

</div>

<!-- ORDER BOOK -->

<div class="card">

<h2>
Order Book
</h2>

<h3 class="green">
BUY ORDERS
</h3>

<div id="buyBook"></div>

<h3
class="red"
style="margin-top:20px"
>
SELL ORDERS
</h3>

<div id="sellBook"></div>

</div>

<!-- TRADE HISTORY -->

<div class="card">

<h2>
Trade History
</h2>

<div id="tradeHistory"></div>

</div>

</div>

<!-- NAV -->

<div class="nav">

<button onclick="scrollTo(0,0)">
Home
</button>

<button onclick="scrollToSection('marketsSection')">
Markets
</button>

<button onclick="scrollToSection('walletSection')">
Wallet
</button>

<button onclick="scrollToSection('depositSection')">
Deposit
</button>

<button onclick="scrollToSection('withdrawSection')">
Withdraw
</button>

</div>

<script>

/* =========================
   MARKET PRICES
========================= */

let prices = {};

const marketSymbols = [

"BTCUSDT",
"ETHUSDT",
"TONUSDT",
"BNBUSDT",
"SOLUSDT",
"XRPUSDT",
"DOGEUSDT"

];

async function loadMarkets(){

let html = "";

for(let symbol of marketSymbols){

try{

const res =
await fetch(
`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`
);

const data =
await res.json();

prices[symbol] =
Number(data.price);

html += `

<div class="market-row">

<div class="coin">

<div class="coin-icon">
${symbol[0]}
</div>

<div>

<div>
${symbol.replace("USDT","")}
</div>

<div class="small">
${symbol}
</div>

</div>

</div>

<div class="green">
$${Number(data.price).toFixed(2)}
</div>

</div>

`;

}catch(e){}

}

document
.getElementById("markets")
.innerHTML = html;

document
.getElementById("btcLive")
.innerText =
"BTC $" +
(prices.BTCUSDT || 0).toFixed(2);

document
.getElementById("ethLive")
.innerText =
"ETH $" +
(prices.ETHUSDT || 0).toFixed(2);

renderWallet();

}

setInterval(loadMarkets,4000);
loadMarkets();

/* =========================
   WALLET SYSTEM
========================= */

let wallet = {

USDT:5000,
BTC:0.12,
ETH:2.5,
TON:180,
BNB:5,
SOL:40,
XRP:2000,
DOGE:12000,
TRY:45000,
IRR:920000000

};

function renderWallet(){

let html = "";

for(let coin in wallet){

html += `

<div class="row">

<div>
${coin}
</div>

<div>
${wallet[coin]}
</div>

</div>

`;

}

document
.getElementById("walletList")
.innerHTML = html;

let total =

wallet.USDT +

(wallet.BTC * (prices.BTCUSDT || 0)) +

(wallet.ETH * (prices.ETHUSDT || 0)) +

(wallet.TON * (prices.TONUSDT || 0)) +

(wallet.BNB * (prices.BNBUSDT || 0)) +

(wallet.SOL * (prices.SOLUSDT || 0));

document
.getElementById("portfolio")
.innerText =
"$" + total.toFixed(2);

}

/* =========================
   DEPOSIT SYSTEM
========================= */

const depositWallets = {

USDT:
"TBiEV2wCiyuLQ6J8uumc2Z6UYNoNYkK6jg",

BTC:
"bc1qd9ah0wegkkne47n3qsqr9xqkvjypfmz2km78jw",

ETH:
"0x84496f0996ea96871DED409428D060dB00cb9136",

TON:
"UQD0VN0pXVlqLkkktfO8NmjaUkU3FMotFAre6vwWJlFCA6IP",

BNB:
"0x84496f0996ea96871DED409428D060dB00cb9136",

SOL:
"652afoXHAveb4RBpHa8g5iE9nL8RaZKhf2A3j7qBthtJ",

TRY:
`BANK: Ziraat Bank
IBAN: TR42 0001 0090 1098 8248 3050 01
NAME: NARIMAN2N ALIZADEH KORDMAHALEH`,

IRR:
`BANK: TEJARAT
CARD: 5859831204847882
SHEBA: IR300180000000004613967414
NAME: Nariman Alizadeh Kordmahaleh`

};

function updateDepositAddress(){

const coin =
document
.getElementById("depositCoin")
.value;

document
.getElementById("depositAddress")
.innerText =
depositWallets[coin];

}

document
.getElementById("depositCoin")
.addEventListener(
"change",
updateDepositAddress
);

updateDepositAddress();

function copyDeposit(){

navigator.clipboard.writeText(
document
.getElementById("depositAddress")
.innerText
);

alert("Copied");

}

let deposits = [];

function fakeDeposit(){

const coin =
document
.getElementById("depositCoin")
.value;

let amount =
prompt("Deposit Amount");

amount = Number(amount);

if(!amount) return;

wallet[coin] += amount;

deposits.push({

coin,
amount,
time:
new Date()
.toLocaleTimeString(),

status:"Completed"

});

renderDeposits();
renderWallet();

}

function renderDeposits(){

document
.getElementById("depositHistory")
.innerHTML =

deposits
.slice()
.reverse()
.map(d=>`

<div class="history">

🟢 ${d.amount} ${d.coin}

<div class="badge buy">
${d.status}
</div>

<div class="small">
${d.time}
</div>

</div>

`).join("");

}

/* =========================
   WITHDRAW SYSTEM
========================= */

let withdraws = [];

function withdraw(){

const coin =
document
.getElementById("withdrawCoin")
.value;

const amount =
Number(
document
.getElementById("withdrawAmount")
.value
);

const address =
document
.getElementById("withdrawAddress")
.value;

if(!amount || !address){

alert("Fill all inputs");

return;

}

if(wallet[coin] < amount){

alert("Insufficient Balance");

return;

}

wallet[coin] -= amount;

withdraws.push({

coin,
amount,
address,

status:"Pending",

time:
new Date()
.toLocaleTimeString()

});

renderWithdraws();
renderWallet();

}

function renderWithdraws(){

document
.getElementById("withdrawHistory")
.innerHTML =

withdraws
.slice()
.reverse()
.map(w=>`

<div class="history">

🔴 ${w.amount} ${w.coin}

<div class="badge pending">
${w.status}
</div>

<div class="small">
${w.address}
</div>

<div class="small">
${w.time}
</div>

</div>

`).join("");

}

/* =========================
   TRADING ENGINE
========================= */

let buyOrders = [];
let sellOrders = [];
let trades = [];

function placeOrder(){

const pair =
document
.getElementById("tradePair")
.value;

const side =
document
.getElementById("tradeSide")
.value;

const price =
Number(
document
.getElementById("tradePrice")
.value
);

const amount =
Number(
document
.getElementById("tradeAmount")
.value
);

if(!price || !amount){

alert("Fill Inputs");

return;

}

const order = {

pair,
side,
price,
amount,

time:
new Date()
.toLocaleTimeString()

};

if(side==="buy"){

buyOrders.push(order);

}else{

sellOrders.push(order);

}

trades.push(order);

renderOrders();

}

function renderOrders(){

document
.getElementById("buyBook")
.innerHTML =

buyOrders
.slice()
.reverse()
.map(o=>`

<div class="trade-row">

<div class="green">
${o.pair}
</div>

<div>
${o.amount}
</div>

<div>
${o.price}
</div>

</div>

`).join("");

document
.getElementById("sellBook")
.innerHTML =

sellOrders
.slice()
.reverse()
.map(o=>`

<div class="trade-row">

<div class="red">
${o.pair}
</div>

<div>
${o.amount}
</div>

<div>
${o.price}
</div>

</div>

`).join("");

document
.getElementById("tradeHistory")
.innerHTML =

trades
.slice()
.reverse()
.map(t=>`

<div class="trade-row">

<div>
${t.side.toUpperCase()}
</div>

<div>
${t.amount}
</div>

<div>
${t.price}
</div>

</div>

`).join("");

}

/* =========================
   SCROLL
========================= */

function scrollToSection(id){

document
.getElementById(id)
.scrollIntoView({

behavior:"smooth"

});

}

/* INIT */

renderWallet();
renderOrders();

</script>

</body>
</html>
