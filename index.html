<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zero Exchange REAL MVP</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1020;
color:white;
}

.page{display:none;padding:20px;}
.page.active{display:block;}

.card{
background:#141b2d;
padding:16px;
border-radius:12px;
margin-bottom:10px;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#f5b942;
font-weight:bold;
cursor:pointer;
}

.green{color:#22c55e;}
.red{color:#ef4444;}
</style>
</head>

<body>

<!-- HOME -->
<div id="homePage" class="page active">
<div class="card">
<h2>Balance</h2>
<h1 id="balance">0</h1>
</div>

<div class="card">
<button onclick="nav('deposit')">Deposit</button>
<button onclick="nav('withdraw')">Withdraw</button>
<button onclick="nav('markets')">Markets</button>
</div>
</div>

<!-- DEPOSIT -->
<div id="deposit" class="page">
<div class="card">
<h3>Deposit Request</h3>

<select id="dcoin">
<option>USDT</option>
<option>BTC</option>
<option>ETH</option>
</select>

<input id="damount" placeholder="Amount"/>

<button onclick="deposit()">Submit</button>
</div>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="page">
<div class="card">
<h3>Withdraw Request</h3>

<select id="wcoin">
<option>USDT</option>
<option>BTC</option>
<option>ETH</option>
</select>

<input id="wamount" placeholder="Amount"/>
<input id="waddress" placeholder="Wallet"/>

<button onclick="withdraw()">Submit</button>
</div>
</div>

<!-- MARKETS -->
<div id="markets" class="page">
<div class="card">
<h3>Live Markets</h3>
<div id="marketBox">Loading...</div>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, doc, getDoc, setDoc, addDoc, collection, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;

/* USER INIT */
onAuthStateChanged(auth, async (u)=>{
if(!u) return;
user=u;

const ref=doc(db,"users",u.uid);
const snap=await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{balance:0});
}

loadBalance();
loadMarkets();
});

/* BALANCE */
async function loadBalance(){
const ref=doc(db,"users",user.uid);
const snap=await getDoc(ref);
document.getElementById("balance").innerText=snap.data().balance;
}

/* DEPOSIT */
window.deposit=async function(){

await addDoc(collection(db,"transactions"),{
uid:user.uid,
type:"deposit",
coin:dcoin.value,
amount:Number(damount.value),
status:"pending",
createdAt:serverTimestamp()
});

alert("Deposit sent");
}

/* WITHDRAW */
window.withdraw=async function(){

await addDoc(collection(db,"transactions"),{
uid:user.uid,
type:"withdraw",
coin:wcoin.value,
amount:Number(wamount.value),
address:waddress.value,
status:"pending",
createdAt:serverTimestamp()
});

alert("Withdraw sent");
}

/* MARKETS */
async function loadMarkets(){

const res=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether,toncoin,binancecoin,dogecoin,ripple,solana&vs_currencies=usd&include_24hr_change=true");
const d=await res.json();

const coins=[
["BTC",d.bitcoin],
["ETH",d.ethereum],
["USDT",d.tether],
["TON",d.toncoin],
["BNB",d.binancecoin],
["DOGE",d.dogecoin],
["XRP",d.ripple],
["SOL",d.solana]
];

let html="";

coins.forEach(c=>{
html+=`
<div class="card">
<b>${c[0]}</b><br>
$${c[1].usd}
<span class="${c[1].usd_24h_change>=0?'green':'red'}">
(${c[1].usd_24h_change.toFixed(2)}%)
</span>
</div>
`;
});

document.getElementById("marketBox").innerHTML=html;
}

window.nav=(p)=>{
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
};

</script>

</body>
</html>
