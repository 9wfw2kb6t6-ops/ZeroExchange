<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zero Exchange V12</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(180deg,#020617,#08112b);
color:white;
overflow-x:hidden;
}

.page{display:none;padding:20px;}
.page.active{display:block;}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
background:rgba(0,0,0,0.4);
position:sticky;
top:0;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:20px;
margin-bottom:15px;
border:1px solid rgba(255,255,255,0.08);
}

button{
cursor:pointer;
padding:12px;
border:none;
border-radius:12px;
margin-top:10px;
background:#f5b942;
font-weight:800;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:none;
background:#0f172a;
color:white;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div>⚡ Zero Exchange</div>
<button onclick="logout()">Logout</button>
</div>

<!-- HOME -->
<div id="homePage" class="page active">

<div class="card">
<h2>Portfolio Balance</h2>
<div style="font-size:40px;font-weight:900">
<span id="balance">0</span> USDT
</div>
</div>

<div class="card">
<button onclick="switchPage('depositPage')">Deposit</button>
<button onclick="switchPage('withdrawPage')">Withdraw</button>
<button onclick="switchPage('historyPage')">History</button>
</div>

</div>

<!-- DEPOSIT -->
<div id="depositPage" class="page">

<div class="card">
<h2>Deposit Request</h2>

<select id="depositCoin">
<option>USDT</option>
<option>BTC</option>
<option>ETH</option>
</select>

<input id="depositAmount" placeholder="Amount"/>

<button onclick="createDeposit()">Submit Deposit</button>
</div>

</div>

<!-- WITHDRAW -->
<div id="withdrawPage" class="page">

<div class="card">
<h2>Withdraw Request</h2>

<select id="withdrawCoin">
<option>USDT</option>
<option>BTC</option>
<option>ETH</option>
</select>

<input id="withdrawAmount" placeholder="Amount"/>
<input id="withdrawAddress" placeholder="Wallet Address"/>

<button onclick="createWithdraw()">Submit Withdraw</button>
</div>

</div>

<!-- HISTORY -->
<div id="historyPage" class="page">

<div class="card">
<h2>Transactions</h2>
<div id="txList"></div>
</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc,
addDoc,
collection,
serverTimestamp,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT",
appId: "YOUR_APP"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;

/* INIT USER */
onAuthStateChanged(auth, async (u)=>{
if(!u) return;

user = u;

const ref = doc(db,"users",u.uid);
const snap = await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{balance:0});
}

loadBalance();
loadHistory();
});

/* LOAD BALANCE (REAL) */
async function loadBalance(){
const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);
document.getElementById("balance").innerText = snap.data().balance;
}

/* CREATE DEPOSIT */
window.createDeposit = async function(){

await addDoc(collection(db,"transactions"),{
uid:user.uid,
type:"deposit",
coin:depositCoin.value,
amount:Number(depositAmount.value),
status:"pending",
createdAt:serverTimestamp()
});

alert("Deposit sent");
}

/* CREATE WITHDRAW */
window.createWithdraw = async function(){

await addDoc(collection(db,"transactions"),{
uid:user.uid,
type:"withdraw",
coin:withdrawCoin.value,
amount:Number(withdrawAmount.value),
address:withdrawAddress.value,
status:"pending",
createdAt:serverTimestamp()
});

alert("Withdraw sent");
}

/* HISTORY */
async function loadHistory(){

const q = query(
collection(db,"transactions"),
where("uid","==",user.uid)
);

const snap = await getDocs(q);

let html="";

snap.forEach(d=>{
const t=d.data();
html+=`
<div style="padding:10px;border-bottom:1px solid #333">
${t.type.toUpperCase()} - ${t.amount} ${t.coin}
<br>
<small>Status: ${t.status}</small>
</div>
`;
});

document.getElementById("txList").innerHTML = html;
}

/* NAV */
window.switchPage=(p)=>{
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

/* LOGOUT */
window.logout=()=>auth.signOut();

</script>

</body>
</html>
