<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zero Exchange X</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet"
>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:'Inter',sans-serif;

  background:
  radial-gradient(circle at top left,#1f2937,#0b0f19 45%),
  #050816;

  color:white;

  min-height:100vh;

  overflow-x:hidden;

}

/* NAVBAR */

.navbar{

  width:100%;

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:20px 40px;

  backdrop-filter:blur(15px);

  background:rgba(255,255,255,0.03);

  border-bottom:1px solid rgba(255,255,255,0.06);

  position:sticky;

  top:0;

  z-index:999;

}

.logo{

  font-size:28px;

  font-weight:700;

  background:linear-gradient(
    90deg,
    #f5b942,
    #ffdf8f
  );

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;

}

.nav-right{

  display:flex;

  gap:15px;

  align-items:center;

}

.balance{

  background:rgba(255,255,255,0.05);

  padding:10px 16px;

  border-radius:12px;

  font-size:14px;

}

.logout-btn{

  background:#ff4d4d;

  border:none;

  padding:10px 16px;

  border-radius:12px;

  color:white;

  font-weight:600;

  cursor:pointer;

}

/* HERO */

.hero{

  padding:50px 30px;

  display:grid;

  grid-template-columns:1.3fr 1fr;

  gap:25px;

}

.glass{

  background:rgba(255,255,255,0.05);

  border:1px solid rgba(255,255,255,0.08);

  backdrop-filter:blur(20px);

  border-radius:24px;

  padding:25px;

  box-shadow:
  0 0 30px rgba(0,0,0,0.3);

}

/* MARKET */

.market-grid{

  display:grid;

  grid-template-columns:repeat(3,1fr);

  gap:15px;

  margin-top:20px;

}

.coin{

  background:rgba(255,255,255,0.04);

  padding:18px;

  border-radius:18px;

  transition:0.3s;

}

.coin:hover{

  transform:translateY(-5px);

  background:rgba(255,255,255,0.07);

}

.coin h3{

  margin-bottom:10px;

}

.green{
  color:#00ffae;
}

.red{
  color:#ff5f7a;
}

/* ORDER PANEL */

.trade-box h2{

  margin-bottom:20px;

}

input,select{

  width:100%;

  margin-top:12px;

  padding:14px;

  border:none;

  border-radius:14px;

  background:#111827;

  color:white;

  font-size:15px;

}

.trade-btn{

  width:100%;

  margin-top:18px;

  padding:15px;

  border:none;

  border-radius:16px;

  background:linear-gradient(
    90deg,
    #f5b942,
    #ffda7b
  );

  color:black;

  font-weight:700;

  cursor:pointer;

  transition:0.3s;

}

.trade-btn:hover{

  transform:scale(1.02);

}

/* ORDERS */

.orders{

  padding:0 30px 40px;

}

.orders h2{

  margin-bottom:20px;

}

.order-card{

  background:rgba(255,255,255,0.04);

  border:1px solid rgba(255,255,255,0.06);

  padding:20px;

  border-radius:20px;

  margin-bottom:15px;

  transition:0.3s;

}

.order-card:hover{

  transform:translateY(-3px);

  background:rgba(255,255,255,0.06);

}

/* LOGIN */

#loginBox{

  position:absolute;

  inset:0;

  display:flex;

  justify-content:center;

  align-items:center;

  background:#050816;

}

.login-card{

  width:360px;

  padding:35px;

}

.login-title{

  font-size:28px;

  font-weight:700;

  margin-bottom:25px;

  text-align:center;

}

.login-btn{

  width:100%;

  margin-top:15px;

  padding:14px;

  border:none;

  border-radius:16px;

  background:linear-gradient(
    90deg,
    #f5b942,
    #ffdf8f
  );

  font-weight:700;

  cursor:pointer;

}

/* MOBILE */

@media(max-width:900px){

  .hero{

    grid-template-columns:1fr;

  }

  .market-grid{

    grid-template-columns:1fr;

  }

  .navbar{

    padding:18px;

  }

}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginBox">

  <div class="glass login-card">

    <div class="login-title">
      Zero Exchange X
    </div>

    <input
      id="email"
      type="email"
      placeholder="Email"
    >

    <input
      id="password"
      type="password"
      placeholder="Password"
    >

    <button
      class="login-btn"
      id="loginBtn"
    >
      Login
    </button>

  </div>

</div>

<!-- APP -->

<div id="app" style="display:none;">

  <!-- NAVBAR -->

  <div class="navbar">

    <div class="logo">
      ZERO X
    </div>

    <div class="nav-right">

      <div class="balance">
        Balance: 24,580 USDT
      </div>

      <button
        class="logout-btn"
        id="logoutBtn"
      >
        Logout
      </button>

    </div>

  </div>

  <!-- HERO -->

  <div class="hero">

    <!-- MARKET -->

    <div class="glass">

      <h2>
        Live Market
      </h2>

      <div class="market-grid">

        <div class="coin">

          <h3>BTC/USDT</h3>

          <p>$104,225</p>

          <span class="green">
            +3.21%
          </span>

        </div>

        <div class="coin">

          <h3>ETH/USDT</h3>

          <p>$5,140</p>

          <span class="green">
            +2.08%
          </span>

        </div>

        <div class="coin">

          <h3>SOL/USDT</h3>

          <p>$202</p>

          <span class="red">
            -1.22%
          </span>

        </div>

      </div>

    </div>

    <!-- TRADE -->

    <div class="glass trade-box">

      <h2>
        Create Order
      </h2>

      <select id="from">

        <option>USDT</option>
        <option>BTC</option>
        <option>ETH</option>

      </select>

      <input
        id="amount"
        type="number"
        placeholder="Amount"
      >

      <select id="to">

        <option>BTC</option>
        <option>ETH</option>
        <option>USDT</option>

      </select>

      <button
        class="trade-btn"
        id="submitBtn"
      >
        Submit Order
      </button>

    </div>

  </div>

  <!-- ORDERS -->

  <div class="orders">

    <h2>
      Recent Orders
    </h2>

    <div id="orders"></div>

  </div>

</div>

<script type="module">

/* FIREBASE */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* CONFIG */

const firebaseConfig = {

  apiKey:"YOUR_API_KEY",

  authDomain:"YOUR_DOMAIN",

  projectId:"YOUR_PROJECT_ID",

  storageBucket:"YOUR_BUCKET",

  messagingSenderId:"YOUR_SENDER_ID",

  appId:"YOUR_APP_ID"

};

/* INIT */

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

/* LOGIN */

async function login(){

  const email =
  document.getElementById("email").value;

  const password =
  document.getElementById("password").value;

  try{

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

  }catch(error){

    alert(error.message);

  }

}

/* LOGOUT */

async function logout(){

  await signOut(auth);

  location.reload();

}

/* AUTH */

onAuthStateChanged(auth,(user)=>{

  if(user){

    document.getElementById(
      "loginBox"
    ).style.display="none";

    document.getElementById(
      "app"
    ).style.display="block";

    loadOrders();

  }

});

/* CREATE ORDER */

async function createOrder(){

  const from =
  document.getElementById("from").value;

  const to =
  document.getElementById("to").value;

  const amount =
  document.getElementById("amount").value;

  if(!amount){

    alert("Enter amount");
    return;

  }

  await addDoc(

    collection(db,"orders"),

    {

      from,
      to,
      amount:Number(amount),

      status:"pending",

      email:auth.currentUser.email,

      createdAt:
      new Date().toLocaleString()

    }

  );

  document.getElementById(
    "amount"
  ).value="";

}

/* LOAD ORDERS */

function loadOrders(){

  onSnapshot(

    collection(db,"orders"),

    (snapshot)=>{

      const orders =
      document.getElementById("orders");

      orders.innerHTML="";

      snapshot.forEach((doc)=>{

        const order = doc.data();

        orders.innerHTML += `

          <div class="order-card">

            <h3>
              ${order.from}
              →
              ${order.to}
            </h3>

            <br>

            Amount:
            ${order.amount}

            <br><br>

            User:
            ${order.email}

            <br><br>

            Status:
            ${order.status}

            <br><br>

            ${order.createdAt}

          </div>

        `;

      });

    }

  );

}

/* EVENTS */

document
.getElementById("loginBtn")
.addEventListener("click",login);

document
.getElementById("logoutBtn")
.addEventListener("click",logout);

document
.getElementById("submitBtn")
.addEventListener("click",createOrder);

</script>

</body>
</html>
