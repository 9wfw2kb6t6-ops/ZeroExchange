<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero Exchange V5</title>

<style>
body{background:#0d1117;color:white;font-family:Arial;padding:20px}
input,button{padding:10px;margin:5px}
.order{background:#161b22;padding:10px;margin:10px;border-radius:8px}
.stats{display:flex;gap:10px;margin:10px 0}
.card{background:#161b22;padding:10px;border-radius:8px;flex:1;text-align:center}
</style>
</head>

<body>

<h2>🚀 Zero Exchange V5</h2>

<!-- LOGIN -->
<div id="loginBox">
  <input id="email" placeholder="email">
  <input id="pass" type="password" placeholder="password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="app" style="display:none">

<div class="stats">
  <div class="card">Orders <span id="c1">0</span></div>
  <div class="card">Pending <span id="c2">0</span></div>
  <div class="card">Approved <span id="c3">0</span></div>
</div>

<h3>New Order</h3>

<select id="from">
<option>USDT</option>
<option>TRY</option>
</select>

<input id="amount" placeholder="amount">

<select id="to">
<option>TRY</option>
<option>USDT</option>
</select>

<button onclick="createOrder()">Submit</button>

<h3>Orders</h3>
<div id="orders"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, addDoc, onSnapshot, updateDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth, signInWithEmailAndPassword, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let ordersCache = [];

/* LOGIN */
window.login = async ()=>{
const email = email.value;
const pass = pass.value;

await signInWithEmailAndPassword(auth,email,pass);
};

/* AUTH STATE */
onAuthStateChanged(auth,user=>{
if(user){
loginBox.style.display="none";
appDiv.style.display="block";
loadOrders();
}
});

const appDiv = document.getElementById("app");
const loginBox = document.getElementById("loginBox");

/* CREATE ORDER */
window.createOrder = async ()=>{

await addDoc(collection(db,"orders"),{
from:from.value,
to:to.value,
amount:Number(amount.value),
status:"pending",
time:Date.now()
});

amount.value="";
};

/* REALTIME ORDERS */
function loadOrders(){
onSnapshot(collection(db,"orders"),snap=>{
ordersCache = snap.docs.map(d=>({id:d.id,...d.data()}));
render();
});
}

/* RENDER */
function render(){

orders.innerHTML="";

let pending=0,approved=0;

ordersCache.forEach(o=>{
if(o.status==="pending") pending++;
if(o.status==="approved") approved++;

const div=document.createElement("div");
div.className="order";

div.innerHTML=`
<b>${o.from} → ${o.to}</b><br>
${o.amount}<br>
${o.status}<br>

<button onclick="update('${o.id}','approved')">Approve</button>
<button onclick="update('${o.id}','rejected')">Reject</button>
`;

orders.appendChild(div);
});

c1.innerText=ordersCache.length;
c2.innerText=pending;
c3.innerText=approved;
}

/* UPDATE */
window.update = async (id,status)=>{

await updateDoc(doc(db,"orders",id),{
status
});

fetch("http://localhost:3000/log",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id,status})
});

};

</script>

</body>
</html>
