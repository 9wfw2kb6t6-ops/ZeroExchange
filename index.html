<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Zero Exchange V5</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
body{background:#0b1220;color:white;font-family:Arial}
.card{margin:10px;padding:10px;background:#111a2e;border-radius:10px}
button{padding:10px;width:100%;margin-top:5px}
</style>
</head>
<body>

<div class="card">
<h2>REAL TIME EXCHANGE</h2>
</div>

<div class="card">
<input id="price" placeholder="Price"/>
<input id="amount" placeholder="Amount"/>
<select id="side">
<option value="buy">BUY</option>
<option value="sell">SELL</option>
</select>
<button onclick="sendOrder()">SEND ORDER</button>
</div>

<div class="card">
<h3>ORDER BOOK</h3>
<div id="book"></div>
</div>

<div class="card">
<h3>TRADES</h3>
<div id="trades"></div>
</div>

<script>

const socket = io("http://localhost:3000");

let state = {buyOrders:[], sellOrders:[], trades:[]};

/* INIT */
socket.on("init",(data)=>{
state = data;
render();
});

/* UPDATE */
socket.on("update",(data)=>{
state = data;
render();
});

/* SEND ORDER */
function sendOrder(){

socket.emit("order",{
price: Number(price.value),
amount: Number(amount.value),
side: side.value,
time: Date.now()
});

}

/* RENDER */
function render(){

document.getElementById("book").innerHTML = `
<h4>BUY</h4>
${state.buyOrders.map(o=>`🟢 ${o.price} | ${o.amount}`).join("<br>")}

<h4>SELL</h4>
${state.sellOrders.map(o=>`🔴 ${o.price} | ${o.amount}`).join("<br>")}
`;

document.getElementById("trades").innerHTML =
state.trades.slice().reverse().map(t=>
`⚡ ${t.amount} @ ${t.price}`
).join("<br>");

}

</script>

</body>
</html>
