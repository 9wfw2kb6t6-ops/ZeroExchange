<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zero Exchange Level 3</title>

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.page{display:none;padding:20px;}
.page.active{display:block;}

.card{
background:rgba(255,255,255,0.05);
padding:16px;
border-radius:14px;
margin-bottom:12px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:#f5b942;
font-weight:800;
cursor:pointer;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

.green{color:#22c55e;}
.red{color:#ef4444;}
</style>
</head>

<body>

<!-- NAV -->
<div class="card">
<button onclick="nav('home')">Home</button>
<button onclick="nav('trade')">Trade</button>
<button onclick="nav('markets')">Markets</button>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="card">
<h2>Portfolio Balance</h2>
<h1 id="balance">0</h1>
</div>

</div>

<!-- TRADE -->
<div id="trade" class="page">

<div class="card">
<h2>Trade</h2>

<select id="pair">
<option value="BTC">BTC / USDT</option>
<option value="ETH">ETH / USDT</option>
<option value="TON">TON / USDT</option>
</select>

<input id="amount" placeholder="Amount (USDT)"/>

<button onclick="buy()">BUY</button>
<button onclick="sell()">SELL</button>

<div id="tradeStatus"></div>
</div>

</div>

<!-- MARKETS -->
<div id="markets" class="page">

<div class="card">
<h2>Live Prices</h2>
<div id="marketBox">Loading...</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, doc, getDoc, setDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;
let prices={};

/* INIT */
onAuthStateChanged(auth, async (u)=>{
if(!u) return;
user=u;

const ref=doc(db,"users",u.uid);
const snap=await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{balance:1000});
}

loadBalance();
loadPrices();
});

/* BALANCE */
async function loadBalance(){
const ref=doc(db,"users",user.uid);
const snap=await getDoc(ref);
document.getElementById("balance").innerText=snap.data().balance;
}

/* BUY */
window.buy = async function(){

const coin = document.getElementById("pair").value;
const amount = Number(document.getElementById("amount").value);

const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

let bal = snap.data().balance;

const price = prices[coin];

if(!price) return;

const cost = amount;

if(bal < cost){
document.getElementById("tradeStatus").innerText="Not enough balance";
return;
}

bal -= cost;

await updateDoc(ref,{balance:bal});

document.getElementById("tradeStatus").innerText=
`Bought ${coin} for $${cost}`;

loadBalance();
}

/* SELL */
window.sell = async function(){

const coin = document.getElementById("pair").value;
const amount = Number(document.getElementById("amount").value);

const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

let bal = snap.data().balance;

const price = prices[coin];

if(!price) return;

const gain = amount;

bal += gain;

await updateDoc(ref,{balance:bal});

document.getElementById("tradeStatus").innerText=
`Sold ${coin} for $${gain}`;

loadBalance();
}

/* PRICES */
async function loadPrices(){

const res = await fetch(
"https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,toncoin&vs_currencies=usd"
);

const d = await res.json();

prices = {
BTC:d.bitcoin.usd,
ETH:d.ethereum.usd,
TON:d.toncoin.usd
};

document.getElementById("marketBox").innerHTML=`
BTC: $${prices.BTC}<br>
ETH: $${prices.ETH}<br>
TON: $${prices.TON}
`;
}

/* NAV */
window.nav=(p)=>{
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
};

</script>

</body>
</html>
